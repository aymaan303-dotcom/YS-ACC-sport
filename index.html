<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر الحسابات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

  :root{
    --bg:#f0f2f5;
    --paper:#fff;
    --ink:#1e2d3d;
    --ink-soft:#6b7a90;
    --line:#e2e8f0;
    --sidebar-bg:#1a2942;
    --sidebar-hover:#243552;
    --sidebar-active:#2d4068;
    --sidebar-accent:#3b82f6;
    --topbar-bg:#fff;
    --c-green:#16a34a;
    --c-green-bg:#16a34a;
    --c-yellow:#d97706;
    --c-yellow-bg:#f59e0b;
    --c-purple:#7c3aed;
    --c-purple-bg:#8b5cf6;
    --c-blue:#1d4ed8;
    --c-blue-bg:#3b82f6;
    --c-red:#dc2626;
    --c-red-bg:#ef4444;
    --c-teal:#0f766e;
    --c-teal-bg:#14b8a6;
    --shadow:0 1px 3px rgba(0,0,0,.08);
    --shadow-md:0 4px 16px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;-webkit-font-smoothing:antialiased;}
  body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;font-size:14px;}

  /* ── App shell ── */
  .app-shell{display:flex;min-height:100vh;flex-direction:row;}

  /* ── Sidebar ── */
  .sidebar{
    width:220px;flex:0 0 220px;background:var(--sidebar-bg);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
    z-index:100;
  }
  .brand{
    padding:18px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;gap:10px;
  }
  .brand-icon{
    width:36px;height:36px;border-radius:9px;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 36px;
  }
  .brand-title{color:#fff;font-weight:800;font-size:14.5px;line-height:1.2;}
  .brand-sub{color:#7a90b8;font-size:10px;margin-top:1px;}
  .sidebar-section-title{
    font-size:10px;color:#4e6288;font-weight:700;letter-spacing:1.2px;
    text-transform:uppercase;padding:16px 16px 6px;
  }
  .side-acc{
    display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:transparent;border:none;color:#9ab0ce;cursor:pointer;
    font-family:inherit;font-size:13.5px;font-weight:600;width:100%;text-align:right;
    border-right:3px solid transparent;transition:.12s;
  }
  .side-acc:hover{background:var(--sidebar-hover);color:#d4dff0;}
  .side-acc.active{background:var(--sidebar-active);color:#fff;border-right-color:var(--sidebar-accent);}
  .side-acc-icon{font-size:15px;flex:0 0 20px;text-align:center;}
  .side-acc-info{display:flex;flex-direction:column;flex:1;overflow:hidden;}
  .side-acc-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .side-acc-net{font-size:10.5px;margin-top:1px;}
  .side-acc-net.pos{color:#4ade80;}
  .side-acc-net.neg{color:#f87171;}
  .side-acc.active .side-acc-net.pos{color:#86efac;}
  .side-acc.active .side-acc-net.neg{color:#fca5a5;}
  .side-empty{color:#4e6288;font-size:12px;padding:10px 16px;}
  .sidebar-add-btn{
    margin:8px 12px 4px;background:rgba(59,130,246,.15);border:1px dashed #3b5a8a;
    color:#7aa0cc;border-radius:8px;padding:9px;font-weight:700;font-size:12px;
    cursor:pointer;font-family:inherit;width:calc(100% - 24px);transition:.15s;
  }
  .sidebar-add-btn:hover{background:rgba(59,130,246,.25);color:#a8c4e8;}
  .sidebar-footer{
    margin-top:auto;padding:14px 16px;font-size:10.5px;color:#4e6288;
    border-top:1px solid rgba(255,255,255,.05);text-align:center;
  }

  /* ── Right panel (topbar + main) ── */
  .right-panel{flex:1;min-width:0;display:flex;flex-direction:column;}

  /* ── Top bar ── */
  .topbar{
    background:var(--topbar-bg);border-bottom:1px solid var(--line);
    padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:90;box-shadow:var(--shadow);flex-shrink:0;
  }
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .topbar-title{font-weight:800;font-size:15px;color:var(--ink);}
  .topbar-badge{
    font-size:10.5px;background:#e0edff;color:#1d4ed8;padding:3px 10px;
    border-radius:20px;font-weight:700;
  }
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-date{font-size:12px;color:var(--ink-soft);}
  .topbar-avatar{
    width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#7c3aed);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;
  }
  #connStatus{font-size:11px;padding:4px 10px;border-radius:20px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}

  /* ── Main content ── */
  .main-content{flex:1;padding:22px 24px 50px;overflow-y:auto;}
  .wrap{max-width:1100px;margin:0 auto;}

  /* ── Combined bar ── */
  .combined{
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;
  }
  @media(max-width:700px){.combined{grid-template-columns:repeat(2,1fr);}}
  .combined-title{grid-column:1/-1;font-size:11px;color:var(--ink-soft);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
  .combined-card{
    border-radius:12px;padding:16px 18px;color:#fff;position:relative;overflow:hidden;
  }
  .combined-card::after{
    content:'';position:absolute;left:-20px;bottom:-20px;width:80px;height:80px;
    border-radius:50%;background:rgba(255,255,255,.08);
  }
  .combined-card .lbl{font-size:11px;opacity:.85;margin-bottom:8px;font-weight:600;}
  .combined-card .val{font-size:22px;font-weight:900;letter-spacing:-.5px;}
  .combined-card.c1{background:linear-gradient(135deg,#16a34a,#22c55e);}
  .combined-card.c2{background:linear-gradient(135deg,#d97706,#f59e0b);}
  .combined-card.c3{background:linear-gradient(135deg,#7c3aed,#a855f7);}
  .combined-card.c4{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}

  /* ── Summary cards ── */
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:640px){.summary{grid-template-columns:repeat(2,1fr);}}
  .card{
    background:var(--paper);border-radius:12px;padding:15px 18px;
    box-shadow:var(--shadow);border:1px solid var(--line);transition:.15s;
  }
  .card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .card .lbl{font-size:11px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .card .val{font-size:19px;font-weight:800;letter-spacing:-.3px;}
  .card.income .val{color:var(--c-green);}
  .card.expense .val{color:var(--c-red);}
  .card.salary .val{color:var(--c-yellow);}
  .card.stock .val{color:var(--c-blue);}
  .card.net{background:var(--sidebar-bg);}
  .card.net .lbl{color:#7a90b8;}
  .card.net .val{color:#fff;font-size:20px;}
  .card.net.pos{background:linear-gradient(135deg,#14532d,#16a34a);}
  .card.net.neg{background:linear-gradient(135deg,#7f1d1d,#dc2626);}

  /* ── Sections ── */
  .section{background:var(--paper);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);}
  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 18px;border-bottom:1px solid var(--line);background:#f8fafc;
  }
  .section-head .title{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.income{background:var(--c-green);}
  .dot.expense{background:var(--c-red);}
  .dot.salary{background:var(--c-yellow);}
  .dot.purchase{background:var(--c-blue);}
  .dot.sale{background:var(--c-green);}
  .dot.cafexpense{background:var(--c-red);}
  .dot.stock{background:var(--c-yellow);}
  .section-head .total{font-weight:800;font-size:14px;}
  .income-section .total,.sale-section .total{color:var(--c-green);}
  .expense-section .total,.cafexpense-section .total{color:var(--c-red);}
  .salary-section .total{color:var(--c-yellow);}
  .purchase-section .total{color:var(--c-blue);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:right;font-size:11px;color:var(--ink-soft);font-weight:700;
    padding:10px 18px;background:#f8fafc;text-transform:uppercase;letter-spacing:.4px;
    border-bottom:1px solid var(--line);
  }
  tbody td{padding:11px 18px;border-bottom:1px solid #f1f4f8;}
  tbody tr:hover td{background:#f5f8ff;}
  tbody tr:last-child td{border-bottom:none;}
  .amt{font-weight:700;}
  .amt.pos{color:var(--c-green);}
  .amt.neg{color:var(--c-red);}
  .del-btn{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:15px;padding:3px 7px;border-radius:7px;}
  .del-btn:hover{background:#fee2e2;color:var(--c-red);}
  .empty-row{padding:24px;color:var(--ink-soft);font-size:13px;text-align:center;}

  .add-row{
    display:flex;gap:8px;padding:13px 18px;background:#f8fafc;
    flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);
  }
  .add-row input,.add-row select{
    flex:1;min-width:100px;border:1.5px solid var(--line);border-radius:8px;
    padding:9px 12px;font-family:inherit;font-size:13px;background:var(--paper);color:var(--ink);
  }
  .add-row input:focus,.add-row select:focus{outline:none;border-color:var(--sidebar-accent);box-shadow:0 0 0 3px #dbeafe;}
  .add-row .date-input{max-width:135px;flex:0 0 135px;}
  .add-row button{
    border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;
    font-family:inherit;color:#fff;font-size:13px;transition:.15s;
  }
  .add-row button:hover{filter:brightness(1.1);}
  .income-section .add-row button,.sale-section .add-row button{background:var(--c-green);}
  .expense-section .add-row button,.cafexpense-section .add-row button{background:var(--c-red);}
  .salary-section .add-row button{background:var(--c-yellow);}
  .purchase-section .add-row button{background:var(--c-blue);}

  /* new account box */
  .new-account-box{
    background:#eff6ff;border:1.5px dashed #93c5fd;border-radius:11px;
    padding:13px;display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;
  }
  .new-account-box input,.new-account-box select{
    flex:1;min-width:130px;border:1.5px solid #bfdbfe;border-radius:8px;
    padding:9px 12px;font-family:inherit;background:#fff;
  }
  .new-account-box button{background:var(--sidebar-accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;}

  /* title row */
  .acc-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .acc-title-row h2{font-weight:900;font-size:20px;margin:0;letter-spacing:-.3px;}
  .acc-badge{font-size:10px;background:#dbeafe;color:#1d4ed8;padding:3px 11px;border-radius:20px;font-weight:700;margin-right:8px;}
  .acc-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-outline{
    background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);
    border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;
    box-shadow:var(--shadow);transition:.15s;
  }
  .btn-outline:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .btn-outline.statement{color:var(--c-blue);border-color:#bfdbfe;}
  .btn-outline.remove{color:var(--c-red);border-color:#fecaca;}
  .btn-outline.monthly{color:var(--c-yellow);border-color:#fde68a;}

  .loading{text-align:center;padding:60px;color:var(--ink-soft);}
  .date-cell{color:var(--ink-soft);font-size:12px;white-space:nowrap;min-width:130px;}

  /* people grid */
  .people-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media(max-width:700px){.people-grid{grid-template-columns:1fr;}}

  /* reminders */
  .reminders-box{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:15px 18px;margin-bottom:14px;}
  .reminders-title{font-weight:800;color:var(--c-red);margin-bottom:10px;font-size:14px;}
  .reminder-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:#fff;border-radius:9px;padding:10px 13px;margin-bottom:7px;flex-wrap:wrap;
    border:1px solid #fee2e2;
  }
  .reminder-row:last-child{margin-bottom:0;}
  .overdue-tag{background:var(--c-red);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;margin-right:6px;}
  .copy-reminder{white-space:nowrap;}
  .reminder-pay-btn{
    background:linear-gradient(135deg,#16a34a,#22c55e);
    border:none;border-radius:8px;padding:7px 14px;
    color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;
    font-family:inherit;white-space:nowrap;transition:.12s;
  }
  .reminder-pay-btn:hover{filter:brightness(1.08);}
  .reminder-pay-btn:active{transform:scale(.95);}

  /* ── Edit deal modal ── */
  #editDealOverlay{
    position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;
    align-items:center;justify-content:center;z-index:960;padding:16px;
  }
  #editDealOverlay.open{display:flex;}
  .edit-deal-modal{
    background:#fff;border-radius:18px;width:100%;max-width:420px;
    padding:24px;box-shadow:0 20px 40px rgba(0,0,0,.2);
  }
  .edm-title{font-weight:900;font-size:17px;margin-bottom:18px;color:var(--ink);}
  .edm-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .edm-lbl{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .edm-input{
    border:1.5px solid var(--line);border-radius:9px;padding:10px 13px;
    font-family:inherit;font-size:14px;color:var(--ink);background:#fff;
  }
  .edm-input:focus{outline:none;border-color:var(--c-blue);}
  .edm-result{
    background:#eff6ff;border-radius:10px;padding:12px 14px;
    margin:14px 0;display:flex;justify-content:space-between;align-items:center;
  }
  .edm-result-lbl{font-size:12px;color:var(--c-blue);font-weight:600;}
  .edm-result-val{font-size:18px;font-weight:800;color:var(--c-blue);}
  .edm-actions{display:flex;gap:8px;margin-top:6px;}
  .edm-save{flex:1;background:var(--c-blue);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  .edm-cancel{background:#f3f4f6;color:var(--ink-soft);border:none;border-radius:10px;padding:11px 18px;font-weight:700;cursor:pointer;font-family:inherit;}
  .edit-deal-btn{
    background:none;border:none;font-size:15px;cursor:pointer;
    padding:4px 7px;border-radius:7px;color:var(--c-blue);
  }
  .edit-deal-btn:hover{background:var(--blue-soft);}
  .clear-deal-btn{
    background:none;border:1.5px solid var(--c-yellow);color:var(--c-yellow);
    border-radius:7px;padding:4px 10px;font-size:12px;font-weight:700;
    cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .clear-deal-btn:hover{background:var(--gold-soft);}

  /* ── Balance cards ── */
  .balances-title{font-weight:800;font-size:14px;color:var(--ink);margin:18px 0 10px;padding-right:4px;}
  .balances-grid{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .balance-card{
    background:var(--paper);border-radius:12px;padding:14px 16px;min-width:200px;flex:1;max-width:260px;
    box-shadow:var(--shadow);border:1px solid var(--line);border-top:3px solid var(--c-blue);
  }
  .balance-card.owed{border-top-color:var(--c-red);}
  .balance-card.clear{border-top-color:var(--c-green);}
  .balance-card.supplier{border-top-color:var(--c-blue);}
  .balance-name{font-weight:800;font-size:14px;margin-bottom:4px;}
  .balance-phone{font-size:11px;color:var(--ink-soft);margin-bottom:8px;}
  .balance-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:3px 0;border-bottom:1px solid #f1f4f8;}
  .balance-row:last-child{border-bottom:none;}
  .balance-row.big{font-weight:800;font-size:14px;margin-top:6px;padding-top:6px;border-top:2px solid var(--line);border-bottom:none;}
  .balance-empty{color:var(--ink-soft);font-size:13px;padding:10px 4px;}

  /* ── Filter bar ── */
  .filter-bar{
    display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line);
    background:#fafbfc;
  }
  .filter-btn{
    background:#fff;border:1.5px solid var(--line);border-radius:20px;
    padding:5px 14px;font-family:inherit;font-size:12px;font-weight:700;
    cursor:pointer;color:var(--ink-soft);transition:.12s;
  }
  .filter-btn:hover{border-color:var(--sidebar-accent);color:var(--sidebar-accent);}
  .filter-btn.active{background:var(--sidebar-bg);color:#fff;border-color:var(--sidebar-bg);}
  .filter-count{
    background:rgba(0,0,0,.1);border-radius:20px;padding:1px 6px;
    font-size:10px;margin-right:3px;
  }
  .filter-btn.active .filter-count{background:rgba(255,255,255,.2);}
  .filter-total{
    display:block;font-size:10px;opacity:.75;margin-top:1px;font-weight:600;
  }
  .cat-tag{
    font-size:10.5px;padding:2px 9px;border-radius:20px;font-weight:700;
  }
  .cat-tag.cat-exp{background:#fee2e2;color:var(--c-red);}
  .cat-tag.cat-sal{background:#fef3c7;color:var(--c-yellow);}
  .cat-tag.cat-adv{background:#ede9fe;color:#7c3aed;}

  /* ── Compact stats bar ── */
  .stats-bar{
    display:flex;align-items:center;flex-wrap:wrap;gap:0;
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:12px 18px;margin-bottom:16px;box-shadow:var(--shadow);
  }
  .stat-item{display:flex;flex-direction:column;align-items:center;padding:0 16px;flex:1;min-width:80px;}
  .stat-lbl{font-size:11px;color:var(--ink-soft);font-weight:600;margin-bottom:4px;text-align:center;}
  .stat-val{font-size:17px;font-weight:800;letter-spacing:-.3px;}
  .stat-val.pos{color:var(--c-green);}
  .stat-val.neg{color:var(--c-red);}
  .stat-sep{width:1px;height:36px;background:var(--line);flex:0 0 1px;}
  @media(max-width:500px){
    .stat-item{padding:0 10px;}
    .stat-val{font-size:14px;}
  }

  /* ── Monthly total banner (installment) ── */
  .monthly-total-banner{
    background:linear-gradient(135deg,#1d4ed8,#3b82f6);
    border-radius:16px;padding:20px 24px;margin-bottom:16px;
    color:#fff;text-align:center;box-shadow:0 8px 24px rgba(29,78,216,.3);
  }
  .monthly-total-label{font-size:12.5px;opacity:.85;margin-bottom:8px;font-weight:600;}
  .monthly-total-amount{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:5px;}
  .monthly-total-sub{font-size:11.5px;opacity:.7;}

  /* ── POS / Cashier ── */
  .pos-shell{
    display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:20px;
    align-items:start;
  }
  @media(max-width:720px){ .pos-shell{grid-template-columns:1fr;} }
  .pos-section-title{font-weight:800;font-size:13px;color:var(--ink-soft);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px;}
  .pos-products{background:var(--paper);border-radius:14px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);}
  .pos-product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
  .pos-product-btn{
    background:#f8fafc;border:1.5px solid var(--line);border-radius:11px;
    padding:12px 8px;cursor:pointer;font-family:inherit;text-align:center;
    transition:.12s;display:flex;flex-direction:column;gap:3px;
  }
  .pos-product-btn:hover{background:var(--primary-light);border-color:var(--sidebar-accent);transform:translateY(-2px);}
  .pos-product-btn:active{transform:scale(.96);}
