<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر الحسابات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

  :root{
    --bg: #f4f6f9;
    --paper: #ffffff;
    --ink: #1a2238;
    --ink-soft: #6b7585;
    --line: #e8eaf0;
    --primary: #1d4ed8;
    --primary-dark: #16306b;
    --primary-light: #eaf0fd;
    --sidebar-bg: #101a33;
    --sidebar-bg-2: #16213f;
    --sidebar-text: #c9d3e8;
    --green: #0f8a4c;
    --green-soft: #e6f7ee;
    --red: #d6332f;
    --red-soft: #fdeceb;
    --gold: #b8740a;
    --gold-soft: #fdf1de;
    --blue: #0e6fa8;
    --blue-soft: #e6f2fa;
    --shadow: 0 1px 3px rgba(16,26,51,.07), 0 1px 2px rgba(16,26,51,.05);
    --shadow-md: 0 8px 24px rgba(16,26,51,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }

  .app-shell{
    display:flex;
    min-height:100vh;
  }

  /* Sidebar */
  .sidebar{
    width:280px;
    flex:0 0 280px;
    background:linear-gradient(180deg,var(--sidebar-bg),var(--sidebar-bg-2));
    color:var(--sidebar-text);
    padding:24px 18px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }
  .brand{ display:flex; align-items:center; gap:12px; margin-bottom:28px; padding:0 4px; }
  .brand-icon{
    width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 42px;
  }
  .brand-title{ color:#fff; font-weight:800; font-size:16px; }
  .brand-sub{ color:#8b96b3; font-size:11px; margin-top:2px; }

  .sidebar-section-title{
    font-size:11px; color:#7480a0; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; margin:6px 4px 10px;
  }

  .side-acc{
    width:100%; display:flex; align-items:center; gap:10px;
    background:transparent; border:none; border-radius:10px; padding:10px 12px;
    color:var(--sidebar-text); cursor:pointer; margin-bottom:4px; text-align:right; font-family:inherit;
    transition:.12s;
  }
  .side-acc:hover{ background:rgba(255,255,255,.06); }
  .side-acc.active{ background:var(--primary); color:#fff; }
  .side-acc-icon{ font-size:17px; flex:0 0 22px; }
  .side-acc-info{ display:flex; flex-direction:column; flex:1; overflow:hidden; }
  .side-acc-name{ font-size:13.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .side-acc-net{ font-size:11px; margin-top:1px; }
  .side-acc-net.pos{ color:#7be3a6; }
  .side-acc-net.neg{ color:#f3a6a3; }
  .side-acc.active .side-acc-net.pos{ color:#c8ffe0; }
  .side-acc.active .side-acc-net.neg{ color:#ffd9d6; }
  .side-empty{ color:#7480a0; font-size:12px; padding:10px 12px; }

  .sidebar-add-btn{
    margin-top:10px; background:rgba(255,255,255,.08); border:1px dashed #4a5578;
    color:#cfd7ec; border-radius:10px; padding:11px; font-weight:700; font-size:13px;
    cursor:pointer; font-family:inherit; width:100%;
  }
  .sidebar-add-btn:hover{ background:rgba(255,255,255,.13); }

  .sidebar-footer{
    margin-top:auto; padding-top:18px; font-size:11px; color:#6c7796; text-align:center;
  }

  /* Main content */
  .main-content{ flex:1; min-width:0; padding:30px 28px 60px; }
  .wrap{max-width:1000px;margin:0 auto;}

  .tabs{ display:none; } /* legacy, superseded by sidebar */
  .tab-add{ display:none; }

  .summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  @media(max-width:640px){.summary{grid-template-columns:repeat(2,1fr);}}
  .card{ background:var(--paper); border-radius:14px; padding:16px 18px; box-shadow:var(--shadow); border:1px solid var(--line); }
  .card .lbl{font-size:12px;color:var(--ink-soft);margin-bottom:8px;font-weight:500;}
  .card .val{font-size:21px;font-weight:800;}
  .card.income .val{color:var(--green);}
  .card.expense .val{color:var(--red);}
  .card.salary .val{color:var(--gold);}
  .card.stock .val{color:var(--blue);}
  .card.net{background:linear-gradient(135deg,#1c2333,#343d56); }
  .card.net .lbl{color:rgba(255,255,255,.65);}
  .card.net .val{font-size:23px;color:#fff;}
  .card.net.pos{background:linear-gradient(135deg,#15803d,#1e9e4d);}
  .card.net.neg{background:linear-gradient(135deg,#dc2626,#b91c1c);}

  .section{ background:var(--paper); border-radius:18px; margin-bottom:18px; overflow:hidden; box-shadow:var(--shadow); }
  .section-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); }
  .section-head .title{ font-weight:800; font-size:16px; display:flex; align-items:center; gap:9px; }
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .dot.income{background:var(--green);} .dot.expense{background:var(--red);} .dot.salary{background:var(--gold);}
  .dot.purchase{background:var(--blue);} .dot.sale{background:var(--green);} .dot.cafexpense{background:var(--red);} .dot.stock{background:var(--gold);}
  .section-head .total{font-weight:800;}
  .income-section .total, .sale-section .total{color:var(--green);}
  .expense-section .total, .cafexpense-section .total{color:var(--red);}
  .salary-section .total{color:var(--gold);}
  .purchase-section .total{color:var(--blue);}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead th{ text-align:right; font-size:12px; color:var(--ink-soft); font-weight:700; padding:10px 20px; background:#fafbfd; }
  tbody td{ padding:12px 20px; border-bottom:1px solid #f1f2f6; }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#fafbff;}
  .amt{font-weight:700;}
  .amt.pos{color:var(--green);} .amt.neg{color:var(--red);}
  .del-btn{ background:none;border:none;color:var(--ink-soft);cursor:pointer; font-size:16px;padding:4px 8px;border-radius:8px; }
  .del-btn:hover{background:var(--red-soft);color:var(--red);}
  .empty-row{padding:20px;color:var(--ink-soft);font-size:13px;text-align:center;}

  .add-row{ display:flex; gap:8px; padding:16px 20px; background:#fafbfd; flex-wrap:wrap; align-items:center; border-top:1px solid var(--line); }
  .add-row input, .add-row select{
    flex:1; min-width:110px; border:1.5px solid var(--line); border-radius:10px;
    padding:11px 13px; font-family:inherit; font-size:14px; background:var(--paper); color:var(--ink);
  }
  .add-row input:focus, .add-row select:focus{outline:none;border-color:var(--primary);}
  .add-row .date-input{max-width:140px;flex:0 0 140px;}
  .add-row button{
    border:none; border-radius:10px; padding:11px 22px; font-weight:700; cursor:pointer;
    font-family:inherit; color:#fff; font-size:14px; transition:.15s;
  }
  .add-row button:hover{opacity:.88;}
  .income-section .add-row button, .sale-section .add-row button{background:var(--green);}
  .expense-section .add-row button, .cafexpense-section .add-row button{background:var(--red);}
  .salary-section .add-row button{background:var(--gold);}
  .purchase-section .add-row button{background:var(--blue);}

  .new-account-box{
    background:var(--primary-light); border-radius:16px;
    padding:16px; display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;
  }
  .new-account-box input, .new-account-box select{ flex:1; min-width:140px; border:1.5px solid #d8d6fb; border-radius:10px; padding:10px 13px; font-family:inherit; background:#fff; }
  .new-account-box button{ background:var(--primary); color:#fff; border:none; border-radius:10px; padding:10px 20px; font-weight:700; cursor:pointer; }

  .acc-title-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .acc-title-row h2{ font-weight:900;font-size:23px;margin:0; }
  .acc-badge{
    font-size:11px; background:var(--blue-soft); color:var(--blue); padding:4px 12px;
    border-radius:20px; font-weight:700; margin-right:8px;
  }
  .acc-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-outline{
    background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);
    border-radius:10px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;
    box-shadow:var(--shadow); transition:.15s;
  }
  .btn-outline:hover{transform:translateY(-1px);}
  .btn-outline.statement{color:var(--blue);}
  .btn-outline.remove{color:var(--red);}
  .btn-outline.monthly{color:var(--gold);}

  .footer-note{ text-align:center;color:var(--ink-soft);font-size:12px;margin-top:30px; }
  .loading{text-align:center;padding:60px;color:var(--ink-soft);}

  .date-cell{color:var(--ink-soft);font-size:13px;white-space:nowrap;}

  .combined{
    background:#fff; color:var(--ink); border-radius:20px; padding:20px;
    margin-bottom:22px; display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
    box-shadow:var(--shadow-md); position:relative; top:-20px;
  }
  @media(max-width:640px){.combined{grid-template-columns:repeat(2,1fr);}}
  .combined .lbl{font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;}
  .combined .val{font-size:19px;font-weight:800;}
  .combined .val.pos{color:var(--green);} .combined .val.neg{color:var(--red);}
  .combined-title{ font-weight:800;font-size:13px;color:var(--primary); grid-column:1/-1;margin-bottom:2px; }

  /* Statement modal */
  #statementOverlay{
    position:fixed;inset:0;background:rgba(28,35,51,.55);display:none;
    align-items:flex-start;justify-content:center;z-index:900;padding:30px 14px;overflow-y:auto;
  }
  .statement-box{
    background:var(--paper);border-radius:20px;max-width:760px;width:100%;
    padding:26px;margin-bottom:40px; box-shadow:var(--shadow-md);
  }
  .statement-head{ display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
  .statement-head h3{ font-weight:900;font-size:19px;margin:0; }
  .close-statement{ background:#f1f2f6;border:none;font-size:18px;cursor:pointer;color:var(--ink-soft);border-radius:50%;width:32px;height:32px; }
  .statement-table th{position:sticky;top:0;background:#fafbfd;}
  .running-bal{font-weight:800;}
  .type-tag{ font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700; }
  .type-tag.in{background:var(--green-soft);color:var(--green);}
  .type-tag.out{background:var(--red-soft);color:var(--red);}

  .people-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px;
  }
  @media(max-width:700px){ .people-grid{grid-template-columns:1fr;} }

  .reminders-box{
    background:var(--red-soft); border-radius:16px; padding:16px 18px; margin-bottom:18px;
  }
  .reminders-title{ font-weight:800; color:var(--red); margin-bottom:10px; font-size:15px; }
  .reminder-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#fff; border-radius:12px; padding:10px 14px; margin-bottom:8px; flex-wrap:wrap;
  }
  .reminder-row:last-child{margin-bottom:0;}
  .overdue-tag{
    background:var(--red); color:#fff; font-size:11px; padding:3px 9px; border-radius:20px;
    font-weight:700; margin-right:6px;
  }
  .copy-reminder{white-space:nowrap;}

  @media(max-width:780px){
    .app-shell{ flex-direction:column; }
    .sidebar{
      width:100%; flex:none; height:auto; position:relative; padding:16px;
      flex-direction:row; align-items:center; flex-wrap:wrap; gap:10px;
    }
    .brand{ margin-bottom:0; flex:0 0 auto; }
    .sidebar-section-title{ display:none; }
    #sidebarAccounts{ display:flex; gap:6px; overflow-x:auto; flex:1; padding-bottom:2px; }
    .side-acc{ width:auto; flex:0 0 auto; flex-direction:row; padding:8px 12px; }
    .side-acc-info{ flex-direction:row; gap:6px; align-items:baseline; }
    .sidebar-add-btn{ width:auto; margin-top:0; padding:9px 14px; flex:0 0 auto; white-space:nowrap; }
    #newAccBoxContainer{ width:100%; }
    .sidebar-footer{ display:none; }
    .main-content{ padding:18px 14px 50px; }
  }
</style>
</head>
<body>

<div id="statementOverlay">
  <div class="statement-box" id="statementBox"></div>
</div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">📒</div>
      <div>
        <div class="brand-title">دفتر الحسابات</div>
        <div class="brand-sub">نظام محاسبة متعدد الحسابات</div>
      </div>
    </div>

    <div class="sidebar-section-title">الحسابات</div>
    <div id="sidebarAccounts"></div>
    <button class="sidebar-add-btn" id="toggleNewAcc">+ إضافة حساب جديد</button>
    <div id="newAccBoxContainer"></div>

    <div class="sidebar-footer">
      <div id="connStatus">⏳ جاري الاتصال بقاعدة البيانات...</div>
    </div>
  </aside>

  <main class="main-content">
    <div class="wrap" id="app">
      <div class="loading">جاري التحميل...</div>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvJRq8p5GegbSHp0z6iD5BLzcXcZxo-tk",
  authDomain: "ys-sport-acc.firebaseapp.com",
  projectId: "ys-sport-acc",
  storageBucket: "ys-sport-acc.firebasestorage.app",
  messagingSenderId: "805303864837",
  appId: "1:805303864837:web:44263d5fbe7f23714d566c"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const STATE_DOC = doc(db, 'accounts-app', 'main-state');

let state = { accounts: [], activeId: null };
let isSavingLocally = false; // prevents our own save from triggering a redundant re-render

function fmt(n){ return new Intl.NumberFormat('ar-EG', {minimumFractionDigits:0, maximumFractionDigits:2}).format(n || 0); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return '—'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function monthLabel(ym){
  const names = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const [y,m] = ym.split('-');
  return `${names[parseInt(m,10)-1]} ${y}`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- State (Firebase Firestore, real-time, shared by everyone) ---------- */
async function loadState(){
  try{
    const snap = await getDoc(STATE_DOC);
    if(snap.exists() && snap.data() && snap.data().json){
      state = JSON.parse(snap.data().json);
    } else {
      state = { accounts: [defaultAccount('الملعب','general'), defaultAccount('السلف','loans')], activeId: null };
      state.activeId = state.accounts[0].id;
      await saveState();
    }
  }catch(e){
    console.error('فشل تحميل البيانات من Firebase', e);
    setConnStatus(false);
    state = { accounts: [defaultAccount('الملعب','general'), defaultAccount('السلف','loans')], activeId: null };
    state.activeId = state.accounts[0].id;
  }
  if(!state.activeId && state.accounts.length) state.activeId = state.accounts[0].id;
  state.accounts.forEach(normalizeAccount);
  if(!state.accounts.some(a=>a.type==='loans')){
    state.accounts.push(defaultAccount('السلف','loans'));
    await saveState();
  }
}
async function saveState(){
  try{
    isSavingLocally = true;
    await setDoc(STATE_DOC, { json: JSON.stringify(state), updatedAt: Date.now() });
    setConnStatus(true);
  }catch(e){
    console.error('فشل الحفظ على Firebase', e);
    setConnStatus(false);
  } finally {
    setTimeout(()=>{ isSavingLocally = false; }, 300);
  }
}

function setConnStatus(ok){
  const el = document.getElementById('connStatus');
  if(!el) return;
  el.textContent = ok ? '🟢 متصل — البيانات مباشرة لجميع المستخدمين' : '🔴 غير متصل — تحقق من الإنترنت';
  el.style.color = ok ? '#7be3a6' : '#f3a6a3';
}

// Real-time listener: any change made by ANY user (anywhere) updates everyone instantly.
onSnapshot(STATE_DOC, (snap)=>{
  if(isSavingLocally) return; // ignore the echo of our own write
  if(!snap.exists()) return;
  const data = snap.data();
  if(!data || !data.json) return;
  const incoming = JSON.parse(data.json);
  if(JSON.stringify(incoming) === JSON.stringify(state)) return;

  // Avoid yanking the form out from under someone who is actively typing
  if(document.activeElement && ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;

  state = incoming;
  state.accounts.forEach(normalizeAccount);
  if(!state.activeId && state.accounts.length) state.activeId = state.accounts[0].id;
  setConnStatus(true);
  render();
}, (err)=>{
  console.error('خطأ في الاتصال المباشر بـ Firebase', err);
  setConnStatus(false);
});

function defaultAccount(name, type){
  if(type === 'cafeteria'){
    return { id: uid(), name, type, products:[], purchases:[], sales:[], cafExpenses:[] };
  }
  if(type === 'installment'){
    return { id: uid(), name, type, customers:[], suppliers:[], deals:[], payments:[] };
  }
  if(type === 'loans'){
    return { id: uid(), name, type, loans:[], repayments:[] };
  }
  return { id: uid(), name, type:'general', income:[], expense:[], salary:[] };
}
function normalizeAccount(acc){
  if(acc.type === 'installment'){
    if(!acc.customers) acc.customers = [];
    if(!acc.suppliers) acc.suppliers = [];
    if(!acc.payments) acc.payments = [];
    if(!acc.deals) acc.deals = [];
  }
  if(acc.type === 'loans'){
    if(!acc.loans) acc.loans = [];
    if(!acc.repayments) acc.repayments = [];
  }
  return acc;
}
function getActive(){ return state.accounts.find(a => a.id === state.activeId); }

function addMonths(dateStr, n){
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().slice(0,10);
}
function dealStatus(acc, deal){
  const paid = acc.payments.filter(p=>p.dealId===deal.id).reduce((s,p)=>s+Number(p.amount||0),0);
  const remaining = Math.max(0, Number(deal.totalPayable||0) - paid);
  const installmentsPaidCount = deal.monthlyInstallment > 0 ? Math.round(paid / deal.monthlyInstallment) : 0;
  const nextDueDate = remaining > 0 ? addMonths(deal.date, installmentsPaidCount + 1) : null;
  const overdue = !!(nextDueDate && nextDueDate < todayStr());
  return {paid, remaining, installmentsPaidCount, nextDueDate, overdue};
}
function loanStatus(acc, loan){
  const paid = acc.repayments.filter(p=>p.loanId===loan.id).reduce((s,p)=>s+Number(p.amount||0),0);
  const remaining = Math.max(0, Number(loan.amount||0) - paid);
  return {paid, remaining};
}

function calcTotalsGeneral(acc){
  const sum = arr => arr.reduce((s,x)=>s+Number(x.amount||0),0);
  const income = sum(acc.income), expense = sum(acc.expense), salary = sum(acc.salary);
  const advances = acc.salary.reduce((s,x)=>s+Number(x.advance||0),0);
  const netSalaryPaid = salary - advances;
  return {income, expense, salary, advances, netSalaryPaid, net: income-expense-salary};
}
function calcTotalsCafeteria(acc){
  const salesRevenue = acc.sales.reduce((s,x)=>s+Number(x.total||0),0);
  const cogs = acc.sales.reduce((s,x)=>s+Number(x.cogs||0),0);
  const purchasesTotal = acc.purchases.reduce((s,x)=>s+Number(x.total||0),0);
  const expensesTotal = acc.cafExpenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const grossProfit = salesRevenue - cogs;
  const net = grossProfit - expensesTotal;
  const stockValue = acc.products.reduce((s,p)=>s+(Number(p.qty||0)*Number(p.avgCost||0)),0);
  return {salesRevenue, cogs, purchasesTotal, expensesTotal, grossProfit, net, stockValue};
}
function calcTotalsInstallment(acc){
  const totalPrice = acc.deals.reduce((s,d)=>s+Number(d.totalPrice||0),0);
  const totalDown = acc.deals.reduce((s,d)=>s+Number(d.downPayment||0),0);
  const totalFinanced = acc.deals.reduce((s,d)=>s+Number(d.financed||0),0);
  const totalInterest = acc.deals.reduce((s,d)=>s+Number(d.interestAmount||0),0);
  const totalPayable = acc.deals.reduce((s,d)=>s+Number(d.totalPayable||0),0);
  const totalPaidInstallments = acc.payments.reduce((s,p)=>s+Number(p.amount||0),0);
  const totalRemaining = acc.deals.reduce((s,d)=>s+dealStatus(acc,d).remaining, 0);
  const overdueDeals = acc.deals.filter(d=>dealStatus(acc,d).overdue);
  return {totalPrice, totalDown, totalFinanced, totalInterest, totalPayable, totalPaidInstallments, totalRemaining, overdueDeals, net: totalInterest};
}
function calcTotalsLoans(acc){
  const totalLent = acc.loans.reduce((s,l)=>s+Number(l.amount||0),0);
  const totalRepaid = acc.repayments.reduce((s,p)=>s+Number(p.amount||0),0);
  const totalRemaining = acc.loans.reduce((s,l)=>s+loanStatus(acc,l).remaining, 0);
  return {totalLent, totalRepaid, totalRemaining, net:0};
}
function getNet(acc){
  if(acc.type === 'cafeteria') return calcTotalsCafeteria(acc).net;
  if(acc.type === 'installment') return calcTotalsInstallment(acc).net;
  if(acc.type === 'loans') return calcTotalsLoans(acc).net;
  return calcTotalsGeneral(acc).net;
}
function calcCombined(){
  let inflow=0, outflow=0;
  state.accounts.forEach(acc=>{
    if(acc.type === 'cafeteria'){
      const t = calcTotalsCafeteria(acc);
      inflow += t.salesRevenue;
      outflow += t.cogs + t.expensesTotal;
    } else if(acc.type === 'installment'){
      const t = calcTotalsInstallment(acc);
      inflow += t.totalInterest;
    } else if(acc.type === 'loans'){
      // loans don't affect profit/loss — they're just outstanding receivables, no inflow/outflow added
    } else {
      const t = calcTotalsGeneral(acc);
      inflow += t.income;
      outflow += t.expense + t.salary;
    }
  });
  return {inflow, outflow, net: inflow-outflow};
}

      <div><div class="lbl">${c.net>=0?'صافي الربح الكلي':'صافي الخسارة الكلية'}</div><div class="val ${c.net>=0?'pos':'neg'}">${fmt(Math.abs(c.net))}</div></div>
    </div>
  `;

    return;
  }

  let body = '';
  if(acc.type === 'cafeteria'){
    body = renderCafeteria(acc);
  } else if(acc.type === 'installment'){
    body = renderInstallment(acc);
  } else if(acc.type === 'loans'){
    body = renderLoans(acc);
  } else {
    body = renderGeneral(acc);
  }

  const badge = acc.type==='cafeteria' ? '<span class="acc-badge">☕ كافيتريا (بضاعة ومخزون)</span>'
    : acc.type==='installment' ? '<span class="acc-badge">🧾 تقسيط (فوائد وأقساط)</span>'
    : acc.type==='loans' ? '<span class="acc-badge">🤝 سلف (مستلفون ومسدّدات)</span>' : '';

  app.innerHTML = `
    ${combinedHtml}
    <div class="acc-title-row">
      <div><h2>${escapeHtml(acc.name)}</h2>${badge}</div>
      <div class="acc-actions">
        <button class="btn-outline monthly" data-action="monthly">📅 الأرباح الشهرية</button>
        <button class="btn-outline statement" data-action="statement">📄 كشف حساب مفصل</button>
        <button class="btn-outline remove" data-action="remove-acc">حذف الحساب</button>
      </div>
    </div>
    ${body}
  `;

  if(acc.type === 'cafeteria'){ bindCafeteria(); }
  else if(acc.type === 'installment'){ bindInstallment(); }
  else if(acc.type === 'loans'){ bindLoans(); }
  else { bindGeneral(); }

  document.querySelector('[data-action="statement"]').addEventListener('click', ()=>openStatement(acc));
  document.querySelector('[data-action="monthly"]').addEventListener('click', ()=>openMonthly(acc));
  document.querySelector('[data-action="remove-acc"]').addEventListener('click', async ()=>{
    if(!confirm(`هل تريد حذف حساب "${acc.name}" نهائيًا؟`)) return;
    state.accounts = state.accounts.filter(a=>a.id !== acc.id);
    state.activeId = state.accounts.length ? state.accounts[0].id : null;
    await saveState(); render();
  });
}

function bindGeneral(){
  document.querySelectorAll('.section[data-key="income"], .section[data-key="expense"]').forEach(section=>{
    const key = section.dataset.key;
    const dateInput = section.querySelector('.date-input');
    const descInput = section.querySelector('.desc-input');
    const amountInput = section.querySelector('.amount-input');
    const addBtn = section.querySelector('[data-add]');
    const doAdd = async ()=>{
      const date = dateInput.value || todayStr();
      const desc = descInput.value.trim();
      const amount = parseFloat(amountInput.value);
      if(!desc || isNaN(amount)) return;
      getActive()[key].push({id: uid(), date, desc, amount});
      descInput.value=''; amountInput.value='';
      await saveState(); render();
    };
    addBtn.addEventListener('click', doAdd);
    amountInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
    descInput.addEventListener('keydown', e=>{ if(e.key==='Enter') amountInput.focus(); });
    section.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const acc = getActive();
        acc[key] = acc[key].filter(it => it.id !== btn.dataset.del);
        await saveState(); render();
      });
    });
  });

  const acc = getActive();
  document.getElementById('addSalaryBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('salaryDate').value || todayStr();
    const desc = document.getElementById('salaryDesc').value.trim();
    const amount = parseFloat(document.getElementById('salaryAmount').value);
    const advance = parseFloat(document.getElementById('salaryAdvance').value) || 0;
    if(!desc || isNaN(amount)) return;
    if(advance > amount){ alert('السلفة لا يمكن أن تكون أكبر من المرتب الإجمالي'); return; }
    acc.salary.push({ id: uid(), date, desc, amount, advance });
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-salary]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.salary = acc.salary.filter(it => it.id !== btn.dataset.delSalary);
      await saveState(); render();
    });
  });
}

function bindCafeteria(){
  const acc = getActive();

  document.getElementById('addPurchaseBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('purchaseDate').value || todayStr();
    const name = document.getElementById('purchaseProductName').value.trim();
    const qty = parseFloat(document.getElementById('purchaseQty').value);
    const unitCost = parseFloat(document.getElementById('purchaseUnitCost').value);
    if(!name || isNaN(qty) || qty<=0 || isNaN(unitCost) || unitCost<0) return;

    let product = acc.products.find(p => p.name.trim() === name);
    if(!product){
      product = { id: uid(), name, qty:0, avgCost:0 };
      acc.products.push(product);
    }
    const newQty = product.qty + qty;
    product.avgCost = newQty > 0 ? ((product.qty*product.avgCost) + (qty*unitCost)) / newQty : unitCost;
    product.qty = newQty;

    acc.purchases.push({ id: uid(), date, productId: product.id, productName: product.name, qty, unitCost, total: qty*unitCost });
    await saveState(); render();
  });

  document.getElementById('addSaleBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('saleDate').value || todayStr();
    const productId = document.getElementById('saleProductId').value;
    const qty = parseFloat(document.getElementById('saleQty').value);
    const unitPrice = parseFloat(document.getElementById('saleUnitPrice').value);
    if(!productId || isNaN(qty) || qty<=0 || isNaN(unitPrice) || unitPrice<0) return;
    const product = acc.products.find(p=>p.id === productId);
    if(!product) return;
    if(qty > product.qty){ alert(`الكمية المتاحة من "${product.name}" هي ${fmt(product.qty)} فقط`); return; }

    const cogs = qty * product.avgCost;
    product.qty -= qty;
    acc.sales.push({ id: uid(), date, productId: product.id, productName: product.name, qty, unitPrice, total: qty*unitPrice, cogs });
    await saveState(); render();
  });

  document.getElementById('addCafExpBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('cafExpDate').value || todayStr();
    const desc = document.getElementById('cafExpDesc').value.trim();
    const kind = document.getElementById('cafExpKind').value;
    const amount = parseFloat(document.getElementById('cafExpAmount').value);
    if(!desc || isNaN(amount)) return;
    acc.cafExpenses.push({ id: uid(), date, desc, kind, amount });
    await saveState(); render();
  });

  document.querySelectorAll('[data-del-purchase]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const p = acc.purchases.find(x=>x.id===btn.dataset.delPurchase);
      if(p){
        const product = acc.products.find(pr=>pr.id===p.productId);
        if(product){
          // reverse stock effect (approximate: just subtract qty, keep avg cost as-is)
          product.qty = Math.max(0, product.qty - p.qty);
        }
        acc.purchases = acc.purchases.filter(x=>x.id!==p.id);
        await saveState(); render();
      }
    });
  });
  document.querySelectorAll('[data-del-sale]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const s = acc.sales.find(x=>x.id===btn.dataset.delSale);
      if(s){
        const product = acc.products.find(pr=>pr.id===s.productId);
        if(product) product.qty += s.qty;
        acc.sales = acc.sales.filter(x=>x.id!==s.id);
        await saveState(); render();
      }
    });
  });
  document.querySelectorAll('[data-del-cafexpense]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.cafExpenses = acc.cafExpenses.filter(x=>x.id!==btn.dataset.delCafexpense);
      await saveState(); render();
    });
  });
}

function bindInstallment(){
  const acc = getActive();

  document.getElementById('addCustBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    if(!name) return;
    acc.customers.push({id: uid(), name, phone});
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-customer]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.customers = acc.customers.filter(c=>c.id!==btn.dataset.delCustomer);
      await saveState(); render();
    });
  });

  document.getElementById('addSuppBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('suppName').value.trim();
    const phone = document.getElementById('suppPhone').value.trim();
    if(!name) return;
    acc.suppliers.push({id: uid(), name, phone});
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-supplier]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.suppliers = acc.suppliers.filter(s=>s.id!==btn.dataset.delSupplier);
      await saveState(); render();
    });
  });

  document.getElementById('addDealBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('dealDate').value || todayStr();
    const customerId = document.getElementById('dealCustomer').value;
    const supplierId = document.getElementById('dealSupplier').value;
    const totalPrice = parseFloat(document.getElementById('dealPrice').value);
    const downPayment = parseFloat(document.getElementById('dealDown').value) || 0;
    const interestRate = parseFloat(document.getElementById('dealRate').value) || 0;
    const months = parseInt(document.getElementById('dealMonths').value, 10);

    if(!customerId){ alert('من فضلك اختر العميل أولًا (أضفه من قائمة العملاء بالأسفل لو لم يكن مضافًا)'); return; }
    if(isNaN(totalPrice) || totalPrice<=0 || isNaN(months) || months<=0) return;
    if(downPayment > totalPrice){ alert('المقدم لا يمكن أن يكون أكبر من السعر الإجمالي'); return; }

    const customer = acc.customers.find(c=>c.id===customerId);
    const supplier = acc.suppliers.find(s=>s.id===supplierId);
    const financed = totalPrice - downPayment;
    const interestAmount = financed * (interestRate/100);
    const totalPayable = financed + interestAmount;
    const monthlyInstallment = totalPayable / months;

    acc.deals.push({
      id: uid(), date, customerId, customerName: customer.name,
      supplierId: supplier?supplier.id:null, supplierName: supplier?supplier.name:null,
      totalPrice, downPayment, interestRate, financed, interestAmount, totalPayable, months, monthlyInstallment
    });
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-deal]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.deals = acc.deals.filter(d=>d.id !== btn.dataset.delDeal);
      acc.payments = acc.payments.filter(p=>p.dealId !== btn.dataset.delDeal);
      await saveState(); render();
    });
  });

  document.getElementById('addPaymentBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('paymentDate').value || todayStr();
    const dealId = document.getElementById('paymentDeal').value;
    const amount = parseFloat(document.getElementById('paymentAmount').value);
    if(!dealId || isNaN(amount) || amount<=0) return;
    const deal = acc.deals.find(d=>d.id===dealId);
    const st = dealStatus(acc, deal);
    if(amount > st.remaining + 0.01){ alert(`المبلغ أكبر من المتبقي على هذا العميل (${fmt(st.remaining)})`); return; }
    acc.payments.push({id: uid(), date, dealId, amount});
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-payment]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.payments = acc.payments.filter(p=>p.id !== btn.dataset.delPayment);
      await saveState(); render();
    });
  });

  document.querySelectorAll('[data-copy-deal]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const deal = acc.deals.find(d=>d.id===btn.dataset.copyDeal);
      const st = dealStatus(acc, deal);
      const text = reminderText(acc, deal, st);
      try{
        await navigator.clipboard.writeText(text);
        btn.textContent = '✅ تم النسخ';
        setTimeout(()=>{ btn.textContent = '📋 نسخ رسالة تذكير'; }, 1800);
      }catch(e){ alert(text); }
    });
  });
}

/* ---------- Detailed statement (كشف حساب) ---------- */
function buildLedger(acc){
  let entries = [];
  if(acc.type === 'cafeteria'){
    acc.purchases.forEach(p => entries.push({date:p.date, desc:`شراء بضاعة: ${p.productName} (${fmt(p.qty)} وحدة)`, type:'شراء', amount:-p.total}));
    acc.sales.forEach(s => entries.push({date:s.date, desc:`بيع بضاعة: ${s.productName} (${fmt(s.qty)} وحدة)`, type:'بيع', amount:+s.total}));
    acc.cafExpenses.forEach(e => entries.push({date:e.date, desc:e.desc, type:e.kind==='buy'?'مصروف شراء':'مصروف بيع', amount:-e.amount}));
  } else if(acc.type === 'installment'){
    acc.deals.forEach(d => {
      entries.push({date:d.date, desc:`مقدم مقبوض من: ${d.customerName}`, type:'مقدم', amount:+d.downPayment});
    });
    acc.payments.forEach(p => {
      const deal = acc.deals.find(d=>d.id===p.dealId);
      entries.push({date:p.date, desc:`قسط مقبوض من: ${deal?deal.customerName:'—'}`, type:'قسط', amount:+p.amount});
    });
  } else if(acc.type === 'loans'){
    acc.loans.forEach(l => entries.push({date:l.date, desc:`سلفة معطاة لـ: ${l.borrowerName}`, type:'سلفة', amount:-l.amount}));
    acc.repayments.forEach(p => {
      const loan = acc.loans.find(l=>l.id===p.loanId);
      entries.push({date:p.date, desc:`سداد سلفة من: ${loan?loan.borrowerName:'—'}`, type:'سداد', amount:+p.amount});
    });
  } else {
    acc.income.forEach(i => entries.push({date:i.date, desc:i.desc, type:'إيراد', amount:+i.amount}));
    acc.expense.forEach(e => entries.push({date:e.date, desc:e.desc, type:'مصروف', amount:-e.amount}));
    acc.salary.forEach(s => entries.push({date:s.date, desc:`مرتب: ${s.desc}`, type:'مرتب', amount:-s.amount}));
  }
  entries.sort((a,b)=> (a.date||'').localeCompare(b.date||''));
  let balance = 0;
  return entries.map(e => { balance += e.amount; return {...e, balance}; });
}

function openStatement(acc){
  const ledger = buildLedger(acc);
  const overlay = document.getElementById('statementOverlay');
  const box = document.getElementById('statementBox');

  box.innerHTML = `
    <div class="statement-head">
      <h3>📄 كشف حساب مفصل — ${escapeHtml(acc.name)}</h3>
      <button class="close-statement" id="closeStatementBtn">✕</button>
    </div>
    <table class="statement-table">
      <thead><tr><th>التاريخ</th><th>البيان</th><th>نوع الحركة</th><th>المبلغ</th><th>الرصيد التراكمي</th></tr></thead>
      <tbody>
        ${ledger.length === 0 ? `<tr><td colspan="5" class="empty-row">لا توجد حركات مسجلة على هذا الحساب بعد</td></tr>` :
          ledger.map(e => `
            <tr>
              <td class="date-cell">${fmtDate(e.date)}</td>
              <td>${escapeHtml(e.desc)}</td>
              <td><span class="type-tag ${e.amount>=0?'in':'out'}">${e.type}</span></td>
              <td class="amt ${e.amount>=0?'pos':'neg'}">${e.amount>=0?'+':'-'}${fmt(Math.abs(e.amount))}</td>
              <td class="running-bal" style="color:${e.balance>=0?'var(--green)':'var(--red)'}">${fmt(e.balance)}</td>
            </tr>
          `).join('')}
      </tbody>
    </table>
  `;
  overlay.style.display = 'flex';
  document.getElementById('closeStatementBtn').addEventListener('click', ()=>{ overlay.style.display = 'none'; });
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.style.display = 'none'; }, {once:true});
}

/* ---------- Monthly profit/loss ---------- */
function calcMonthly(acc){
  const ledger = buildLedger(acc);
  const byMonth = {};
  ledger.forEach(e=>{
    const ym = (e.date || '').slice(0,7) || 'بدون تاريخ';
    if(!byMonth[ym]) byMonth[ym] = {inflow:0, outflow:0};
    if(e.amount >= 0) byMonth[ym].inflow += e.amount;
    else byMonth[ym].outflow += -e.amount;
  });
  return Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(ym => ({
    ym, inflow: byMonth[ym].inflow, outflow: byMonth[ym].outflow, net: byMonth[ym].inflow - byMonth[ym].outflow
  }));
}
function openMonthly(acc){
  const months = calcMonthly(acc);
  const overlay = document.getElementById('statementOverlay');
  const box = document.getElementById('statementBox');
  box.innerHTML = `
    <div class="statement-head">
      <h3>📅 الأرباح والخسائر الشهرية — ${escapeHtml(acc.name)}</h3>
      <button class="close-statement" id="closeStatementBtn">✕</button>
    </div>
    <table class="statement-table">
      <thead><tr><th>الشهر</th><th>إجمالي الداخل</th><th>إجمالي الخارج</th><th>صافي الربح / الخسارة</th></tr></thead>
      <tbody>
        ${months.length === 0 ? `<tr><td colspan="4" class="empty-row">لا توجد حركات مسجلة بعد</td></tr>` :
          months.map(m => `
            <tr>
              <td>${m.ym === 'بدون تاريخ' ? m.ym : monthLabel(m.ym)}</td>
              <td class="amt pos">${fmt(m.inflow)}</td>
              <td class="amt neg">${fmt(m.outflow)}</td>
              <td class="amt ${m.net>=0?'pos':'neg'}">${m.net>=0?'ربح ':'خسارة '}${fmt(Math.abs(m.net))}</td>
            </tr>
          `).join('')}
      </tbody>
    </table>
  `;
  overlay.style.display = 'flex';
  document.getElementById('closeStatementBtn').addEventListener('click', ()=>{ overlay.style.display = 'none'; });
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.style.display = 'none'; }, {once:true});
}

/* ---------- Init ---------- */
(async ()=>{
  await loadState();
  render();
})();
</script>
