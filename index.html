<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر الحسابات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

  :root{
    --bg:#f0f2f5;
    --paper:#fff;
    --ink:#1e2d3d;
    --ink-soft:#6b7a90;
    --line:#e2e8f0;
    --sidebar-bg:#1a2942;
    --sidebar-hover:#243552;
    --sidebar-active:#2d4068;
    --sidebar-accent:#3b82f6;
    --topbar-bg:#fff;
    --c-green:#16a34a;
    --c-green-bg:#16a34a;
    --c-yellow:#d97706;
    --c-yellow-bg:#f59e0b;
    --c-purple:#7c3aed;
    --c-purple-bg:#8b5cf6;
    --c-blue:#1d4ed8;
    --c-blue-bg:#3b82f6;
    --c-red:#dc2626;
    --c-red-bg:#ef4444;
    --c-teal:#0f766e;
    --c-teal-bg:#14b8a6;
    --shadow:0 1px 3px rgba(0,0,0,.08);
    --shadow-md:0 4px 16px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;-webkit-font-smoothing:antialiased;}
  body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;font-size:14px;}

  /* ── App shell ── */
  .app-shell{display:flex;min-height:100vh;flex-direction:row;}

  /* ── Sidebar ── */
  .sidebar{
    width:220px;flex:0 0 220px;background:var(--sidebar-bg);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
    z-index:100;
  }
  .brand{
    padding:18px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;gap:10px;
  }
  .brand-icon{
    width:36px;height:36px;border-radius:9px;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 36px;
  }
  .brand-title{color:#fff;font-weight:800;font-size:14.5px;line-height:1.2;}
  .brand-sub{color:#7a90b8;font-size:10px;margin-top:1px;}
  .sidebar-section-title{
    font-size:10px;color:#4e6288;font-weight:700;letter-spacing:1.2px;
    text-transform:uppercase;padding:16px 16px 6px;
  }
  .side-acc{
    display:flex;align-items:center;gap:10px;padding:10px 16px;
    background:transparent;border:none;color:#9ab0ce;cursor:pointer;
    font-family:inherit;font-size:13.5px;font-weight:600;width:100%;text-align:right;
    border-right:3px solid transparent;transition:.12s;
  }
  .side-acc:hover{background:var(--sidebar-hover);color:#d4dff0;}
  .side-acc.active{background:var(--sidebar-active);color:#fff;border-right-color:var(--sidebar-accent);}
  .side-acc-icon{font-size:15px;flex:0 0 20px;text-align:center;}
  .side-acc-info{display:flex;flex-direction:column;flex:1;overflow:hidden;}
  .side-acc-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .side-acc-net{font-size:10.5px;margin-top:1px;}
  .side-acc-net.pos{color:#4ade80;}
  .side-acc-net.neg{color:#f87171;}
  .side-acc.active .side-acc-net.pos{color:#86efac;}
  .side-acc.active .side-acc-net.neg{color:#fca5a5;}
  .side-empty{color:#4e6288;font-size:12px;padding:10px 16px;}
  .sidebar-add-btn{
    margin:8px 12px 4px;background:rgba(59,130,246,.15);border:1px dashed #3b5a8a;
    color:#7aa0cc;border-radius:8px;padding:9px;font-weight:700;font-size:12px;
    cursor:pointer;font-family:inherit;width:calc(100% - 24px);transition:.15s;
  }
  .sidebar-add-btn:hover{background:rgba(59,130,246,.25);color:#a8c4e8;}
  .sidebar-footer{
    margin-top:auto;padding:14px 16px;font-size:10.5px;color:#4e6288;
    border-top:1px solid rgba(255,255,255,.05);text-align:center;
  }

  /* ── Right panel (topbar + main) ── */
  .right-panel{flex:1;min-width:0;display:flex;flex-direction:column;}

  /* ── Top bar ── */
  .topbar{
    background:var(--topbar-bg);border-bottom:1px solid var(--line);
    padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:90;box-shadow:var(--shadow);flex-shrink:0;
  }
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .topbar-title{font-weight:800;font-size:15px;color:var(--ink);}
  .topbar-badge{
    font-size:10.5px;background:#e0edff;color:#1d4ed8;padding:3px 10px;
    border-radius:20px;font-weight:700;
  }
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-date{font-size:12px;color:var(--ink-soft);}
  .topbar-avatar{
    width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#7c3aed);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;
  }
  #connStatus{font-size:11px;padding:4px 10px;border-radius:20px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}

  /* ── Main content ── */
  .main-content{flex:1;padding:22px 24px 50px;overflow-y:auto;}
  .wrap{max-width:1100px;margin:0 auto;}

  /* ── Combined bar ── */
  .combined{
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;
  }
  @media(max-width:700px){.combined{grid-template-columns:repeat(2,1fr);}}
  .combined-title{grid-column:1/-1;font-size:11px;color:var(--ink-soft);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
  .combined-card{
    border-radius:12px;padding:16px 18px;color:#fff;position:relative;overflow:hidden;
  }
  .combined-card::after{
    content:'';position:absolute;left:-20px;bottom:-20px;width:80px;height:80px;
    border-radius:50%;background:rgba(255,255,255,.08);
  }
  .combined-card .lbl{font-size:11px;opacity:.85;margin-bottom:8px;font-weight:600;}
  .combined-card .val{font-size:22px;font-weight:900;letter-spacing:-.5px;}
  .combined-card.c1{background:linear-gradient(135deg,#16a34a,#22c55e);}
  .combined-card.c2{background:linear-gradient(135deg,#d97706,#f59e0b);}
  .combined-card.c3{background:linear-gradient(135deg,#7c3aed,#a855f7);}
  .combined-card.c4{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}

  /* ── Summary cards ── */
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:640px){.summary{grid-template-columns:repeat(2,1fr);}}
  .card{
    background:var(--paper);border-radius:12px;padding:15px 18px;
    box-shadow:var(--shadow);border:1px solid var(--line);transition:.15s;
  }
  .card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .card .lbl{font-size:11px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .card .val{font-size:19px;font-weight:800;letter-spacing:-.3px;}
  .card.income .val{color:var(--c-green);}
  .card.expense .val{color:var(--c-red);}
  .card.salary .val{color:var(--c-yellow);}
  .card.stock .val{color:var(--c-blue);}
  .card.net{background:var(--sidebar-bg);}
  .card.net .lbl{color:#7a90b8;}
  .card.net .val{color:#fff;font-size:20px;}
  .card.net.pos{background:linear-gradient(135deg,#14532d,#16a34a);}
  .card.net.neg{background:linear-gradient(135deg,#7f1d1d,#dc2626);}

  /* ── Sections ── */
  .section{background:var(--paper);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);}
  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 18px;border-bottom:1px solid var(--line);background:#f8fafc;
  }
  .section-head .title{font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.income{background:var(--c-green);}
  .dot.expense{background:var(--c-red);}
  .dot.salary{background:var(--c-yellow);}
  .dot.purchase{background:var(--c-blue);}
  .dot.sale{background:var(--c-green);}
  .dot.cafexpense{background:var(--c-red);}
  .dot.stock{background:var(--c-yellow);}
  .section-head .total{font-weight:800;font-size:14px;}
  .income-section .total,.sale-section .total{color:var(--c-green);}
  .expense-section .total,.cafexpense-section .total{color:var(--c-red);}
  .salary-section .total{color:var(--c-yellow);}
  .purchase-section .total{color:var(--c-blue);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:right;font-size:11px;color:var(--ink-soft);font-weight:700;
    padding:10px 18px;background:#f8fafc;text-transform:uppercase;letter-spacing:.4px;
    border-bottom:1px solid var(--line);
  }
  tbody td{padding:11px 18px;border-bottom:1px solid #f1f4f8;}
  tbody tr:hover td{background:#f5f8ff;}
  tbody tr:last-child td{border-bottom:none;}
  .amt{font-weight:700;}
  .amt.pos{color:var(--c-green);}
  .amt.neg{color:var(--c-red);}
  .del-btn{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:15px;padding:3px 7px;border-radius:7px;}
  .del-btn:hover{background:#fee2e2;color:var(--c-red);}
  .empty-row{padding:24px;color:var(--ink-soft);font-size:13px;text-align:center;}

  .add-row{
    display:flex;gap:8px;padding:13px 18px;background:#f8fafc;
    flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);
  }
  .add-row input,.add-row select{
    flex:1;min-width:100px;border:1.5px solid var(--line);border-radius:8px;
    padding:9px 12px;font-family:inherit;font-size:13px;background:var(--paper);color:var(--ink);
  }
  .add-row input:focus,.add-row select:focus{outline:none;border-color:var(--sidebar-accent);box-shadow:0 0 0 3px #dbeafe;}
  .add-row .date-input{max-width:135px;flex:0 0 135px;}
  .add-row button{
    border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;
    font-family:inherit;color:#fff;font-size:13px;transition:.15s;
  }
  .add-row button:hover{filter:brightness(1.1);}
  .income-section .add-row button,.sale-section .add-row button{background:var(--c-green);}
  .expense-section .add-row button,.cafexpense-section .add-row button{background:var(--c-red);}
  .salary-section .add-row button{background:var(--c-yellow);}
  .purchase-section .add-row button{background:var(--c-blue);}

  /* new account box */
  .new-account-box{
    background:#eff6ff;border:1.5px dashed #93c5fd;border-radius:11px;
    padding:13px;display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;
  }
  .new-account-box input,.new-account-box select{
    flex:1;min-width:130px;border:1.5px solid #bfdbfe;border-radius:8px;
    padding:9px 12px;font-family:inherit;background:#fff;
  }
  .new-account-box button{background:var(--sidebar-accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;}

  /* title row */
  .acc-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .acc-title-row h2{font-weight:900;font-size:20px;margin:0;letter-spacing:-.3px;}
  .acc-badge{font-size:10px;background:#dbeafe;color:#1d4ed8;padding:3px 11px;border-radius:20px;font-weight:700;margin-right:8px;}
  .acc-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-outline{
    background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);
    border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;
    box-shadow:var(--shadow);transition:.15s;
  }
  .btn-outline:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .btn-outline.statement{color:var(--c-blue);border-color:#bfdbfe;}
  .btn-outline.remove{color:var(--c-red);border-color:#fecaca;}
  .btn-outline.monthly{color:var(--c-yellow);border-color:#fde68a;}

  .loading{text-align:center;padding:60px;color:var(--ink-soft);}
  .date-cell{color:var(--ink-soft);font-size:12px;white-space:nowrap;min-width:130px;}

  /* people grid */
  .people-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media(max-width:700px){.people-grid{grid-template-columns:1fr;}}

  /* reminders */
  .reminders-box{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:15px 18px;margin-bottom:14px;}
  .reminders-title{font-weight:800;color:var(--c-red);margin-bottom:10px;font-size:14px;}
  .reminder-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:#fff;border-radius:9px;padding:10px 13px;margin-bottom:7px;flex-wrap:wrap;
    border:1px solid #fee2e2;
  }
  .reminder-row:last-child{margin-bottom:0;}
  .overdue-tag{background:var(--c-red);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;margin-right:6px;}
  .copy-reminder{white-space:nowrap;}
  .reminder-pay-btn{
    background:linear-gradient(135deg,#16a34a,#22c55e);
    border:none;border-radius:8px;padding:7px 14px;
    color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;
    font-family:inherit;white-space:nowrap;transition:.12s;
  }
  .reminder-pay-btn:hover{filter:brightness(1.08);}
  .reminder-pay-btn:active{transform:scale(.95);}

  /* ── Edit deal modal ── */
  #editDealOverlay{
    position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;
    align-items:center;justify-content:center;z-index:960;padding:16px;
  }
  #editDealOverlay.open{display:flex;}
  .edit-deal-modal{
    background:#fff;border-radius:18px;width:100%;max-width:420px;
    padding:24px;box-shadow:0 20px 40px rgba(0,0,0,.2);
  }
  .edm-title{font-weight:900;font-size:17px;margin-bottom:18px;color:var(--ink);}
  .edm-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .edm-lbl{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .edm-input{
    border:1.5px solid var(--line);border-radius:9px;padding:10px 13px;
    font-family:inherit;font-size:14px;color:var(--ink);background:#fff;
  }
  .edm-input:focus{outline:none;border-color:var(--c-blue);}
  .edm-result{
    background:#eff6ff;border-radius:10px;padding:12px 14px;
    margin:14px 0;display:flex;justify-content:space-between;align-items:center;
  }
  .edm-result-lbl{font-size:12px;color:var(--c-blue);font-weight:600;}
  .edm-result-val{font-size:18px;font-weight:800;color:var(--c-blue);}
  .edm-actions{display:flex;gap:8px;margin-top:6px;}
  .edm-save{flex:1;background:var(--c-blue);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  .edm-cancel{background:#f3f4f6;color:var(--ink-soft);border:none;border-radius:10px;padding:11px 18px;font-weight:700;cursor:pointer;font-family:inherit;}
  .edit-deal-btn{
    background:none;border:none;font-size:15px;cursor:pointer;
    padding:4px 7px;border-radius:7px;color:var(--c-blue);
  }
  .edit-deal-btn:hover{background:var(--blue-soft);}
  .clear-deal-btn{
    background:none;border:1.5px solid var(--c-yellow);color:var(--c-yellow);
    border-radius:7px;padding:4px 10px;font-size:12px;font-weight:700;
    cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .clear-deal-btn:hover{background:var(--gold-soft);}

  /* ── Balance cards ── */
  .balances-title{font-weight:800;font-size:14px;color:var(--ink);margin:18px 0 10px;padding-right:4px;}
  .balances-grid{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .balance-card{
    background:var(--paper);border-radius:12px;padding:14px 16px;min-width:200px;flex:1;max-width:260px;
    box-shadow:var(--shadow);border:1px solid var(--line);border-top:3px solid var(--c-blue);
  }
  .balance-card.owed{border-top-color:var(--c-red);}
  .balance-card.clear{border-top-color:var(--c-green);}
  .balance-card.supplier{border-top-color:var(--c-blue);}
  .balance-name{font-weight:800;font-size:14px;margin-bottom:4px;}
  .balance-phone{font-size:11px;color:var(--ink-soft);margin-bottom:8px;}
  .balance-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:3px 0;border-bottom:1px solid #f1f4f8;}
  .balance-row:last-child{border-bottom:none;}
  .balance-row.big{font-weight:800;font-size:14px;margin-top:6px;padding-top:6px;border-top:2px solid var(--line);border-bottom:none;}
  .balance-empty{color:var(--ink-soft);font-size:13px;padding:10px 4px;}

  /* ── Filter bar ── */
  .filter-bar{
    display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line);
    background:#fafbfc;
  }
  .filter-btn{
    background:#fff;border:1.5px solid var(--line);border-radius:20px;
    padding:5px 14px;font-family:inherit;font-size:12px;font-weight:700;
    cursor:pointer;color:var(--ink-soft);transition:.12s;
  }
  .filter-btn:hover{border-color:var(--sidebar-accent);color:var(--sidebar-accent);}
  .filter-btn.active{background:var(--sidebar-bg);color:#fff;border-color:var(--sidebar-bg);}
  .filter-count{
    background:rgba(0,0,0,.1);border-radius:20px;padding:1px 6px;
    font-size:10px;margin-right:3px;
  }
  .filter-btn.active .filter-count{background:rgba(255,255,255,.2);}
  .filter-total{
    display:block;font-size:10px;opacity:.75;margin-top:1px;font-weight:600;
  }
  .cat-tag{
    font-size:10.5px;padding:2px 9px;border-radius:20px;font-weight:700;
  }
  .cat-tag.cat-exp{background:#fee2e2;color:var(--c-red);}
  .cat-tag.cat-sal{background:#fef3c7;color:var(--c-yellow);}
  .cat-tag.cat-adv{background:#ede9fe;color:#7c3aed;}

  /* ── Compact stats bar ── */
  .stats-bar{
    display:flex;align-items:center;flex-wrap:wrap;gap:0;
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:12px 18px;margin-bottom:16px;box-shadow:var(--shadow);
  }
  .stat-item{display:flex;flex-direction:column;align-items:center;padding:0 16px;flex:1;min-width:80px;}
  .stat-lbl{font-size:11px;color:var(--ink-soft);font-weight:600;margin-bottom:4px;text-align:center;}
  .stat-val{font-size:17px;font-weight:800;letter-spacing:-.3px;}
  .stat-val.pos{color:var(--c-green);}
  .stat-val.neg{color:var(--c-red);}
  .stat-sep{width:1px;height:36px;background:var(--line);flex:0 0 1px;}
  @media(max-width:500px){
    .stat-item{padding:0 10px;}
    .stat-val{font-size:14px;}
  }

  /* ── Monthly total banner (installment) ── */
  .monthly-total-banner{
    background:linear-gradient(135deg,#1d4ed8,#3b82f6);
    border-radius:16px;padding:20px 24px;margin-bottom:16px;
    color:#fff;text-align:center;box-shadow:0 8px 24px rgba(29,78,216,.3);
  }
  .monthly-total-label{font-size:12.5px;opacity:.85;margin-bottom:8px;font-weight:600;}
  .monthly-total-amount{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:5px;}
  .monthly-total-sub{font-size:11.5px;opacity:.7;}

  /* ── POS / Cashier ── */
  .pos-shell{
    display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:20px;
    align-items:start;
  }
  @media(max-width:720px){ .pos-shell{grid-template-columns:1fr;} }
  .pos-section-title{font-weight:800;font-size:13px;color:var(--ink-soft);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px;}
  .pos-products{background:var(--paper);border-radius:14px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);}
  .pos-product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
  .pos-product-btn{
    background:#f8fafc;border:1.5px solid var(--line);border-radius:11px;
    padding:12px 8px;cursor:pointer;font-family:inherit;text-align:center;
    transition:.12s;display:flex;flex-direction:column;gap:3px;
  }
  .pos-product-btn:hover{background:var(--primary-light);border-color:var(--sidebar-accent);transform:translateY(-2px);}
  .pos-product-btn:active{transform:scale(.96);}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvJRq8p5GegbSHp0z6iD5BLzcXcZxo-tk",
  authDomain: "ys-sport-acc.firebaseapp.com",
  projectId: "ys-sport-acc",
  storageBucket: "ys-sport-acc.firebasestorage.app",
  messagingSenderId: "805303864837",
  appId: "1:805303864837:web:44263d5fbe7f23714d566c"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const STATE_DOC = doc(db, 'accounts-app', 'main-state');

let state = { accounts: [], activeId: null };
let isSavingLocally = false; // prevents our own save from triggering a redundant re-render

function fmt(n){ return new Intl.NumberFormat('ar-EG', {minimumFractionDigits:0, maximumFractionDigits:2}).format(n || 0); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const dateObj = new Date(`${y}-${m}-${day}T00:00:00`);
  const dayName = dateObj.toLocaleDateString('ar-EG', {weekday:'long'});
  return `${dayName} ${day}/${m}/${y}`;
}
function monthLabel(ym){
  const names = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const [y,m] = ym.split('-');
  return `${names[parseInt(m,10)-1]} ${y}`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- State (Firebase Firestore, real-time, shared by everyone) ---------- */
async function loadState(){
  try{
    const snap = await getDoc(STATE_DOC);
    if(snap.exists() && snap.data() && snap.data().json){
      state = JSON.parse(snap.data().json);
    } else {
      state = { accounts: [defaultAccount('الملعب','general'), defaultAccount('السلف','loans')], activeId: null };
      state.activeId = state.accounts[0].id;
      await saveState();
    }
  }catch(e){
    console.error('فشل تحميل البيانات من Firebase', e);
    setConnStatus(false);
    state = { accounts: [defaultAccount('الملعب','general'), defaultAccount('السلف','loans')], activeId: null };
    state.activeId = state.accounts[0].id;
  }
  if(!state.activeId && state.accounts.length) state.activeId = state.accounts[0].id;
  state.accounts.forEach(normalizeAccount);
  if(!state.accounts.some(a=>a.type==='loans')){
    state.accounts.push(defaultAccount('السلف','loans'));
    await saveState();
  }
}
async function saveState(){
  try{
    isSavingLocally = true;
    await setDoc(STATE_DOC, { json: JSON.stringify(state), updatedAt: Date.now() });
    setConnStatus(true);
  }catch(e){
    console.error('فشل الحفظ على Firebase', e);
    setConnStatus(false);
  } finally {
    setTimeout(()=>{ isSavingLocally = false; }, 300);
  }
}

function setConnStatus(ok){
  const el = document.getElementById('connStatus');
  if(!el) return;
  el.textContent = ok ? '🟢 متصل — البيانات مباشرة لجميع المستخدمين' : '🔴 غير متصل — تحقق من الإنترنت';
  el.style.color = ok ? '#7be3a6' : '#f3a6a3';
}

// Real-time listener: any change made by ANY user (anywhere) updates everyone instantly.
onSnapshot(STATE_DOC, (snap)=>{
  if(isSavingLocally) return; // ignore the echo of our own write
  if(!snap.exists()) return;
  const data = snap.data();
  if(!data || !data.json) return;
  const incoming = JSON.parse(data.json);
  if(JSON.stringify(incoming) === JSON.stringify(state)) return;

  // Avoid yanking the form out from under someone who is actively typing
  if(document.activeElement && ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;

  state = incoming;
  state.accounts.forEach(normalizeAccount);
  if(!state.activeId && state.accounts.length) state.activeId = state.accounts[0].id;
  setConnStatus(true);
  render();
}, (err)=>{
  console.error('خطأ في الاتصال المباشر بـ Firebase', err);
  setConnStatus(false);
});

function defaultAccount(name, type){
  if(type === 'cafeteria'){
    return { id: uid(), name, type, products:[], purchases:[], sales:[], cafExpenses:[], cafPayments:[] };
  }
  if(type === 'installment'){
    return { id: uid(), name, type, customers:[], suppliers:[], deals:[], payments:[] };
  }
  if(type === 'loans'){
    return { id: uid(), name, type, loans:[], repayments:[] };
  }
  return { id: uid(), name, type:'general', income:[], expense:[], salary:[] };
}
function normalizeAccount(acc){
  if(acc.type === 'cafeteria'){
    if(!acc.cafPayments) acc.cafPayments = [];
  }
  if(acc.type === 'installment'){
    if(!acc.customers) acc.customers = [];
    if(!acc.suppliers) acc.suppliers = [];
    if(!acc.payments) acc.payments = [];
    if(!acc.deals) acc.deals = [];
  }
  if(acc.type === 'loans'){
    if(!acc.loans) acc.loans = [];
    if(!acc.repayments) acc.repayments = [];
  }
  return acc;
}
function getActive(){ return state.accounts.find(a => a.id === state.activeId); }

function addMonths(dateStr, n){
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + n);
  return d.toISOString().slice(0,10);
}
function dealStatus(acc, deal){
  const paid = acc.payments.filter(p=>p.dealId===deal.id).reduce((s,p)=>s+Number(p.amount||0),0);
  const remaining = Math.max(0, Number(deal.totalPayable||0) - paid);
  const installmentsPaidCount = deal.monthlyInstallment > 0 ? Math.round(paid / deal.monthlyInstallment) : 0;
  const nextDueDate = remaining > 0 ? addMonths(deal.date, installmentsPaidCount + 1) : null;
  const overdue = !!(nextDueDate && nextDueDate < todayStr());
  return {paid, remaining, installmentsPaidCount, nextDueDate, overdue};
}
function loanStatus(acc, loan){
  const paid = acc.repayments.filter(p=>p.loanId===loan.id).reduce((s,p)=>s+Number(p.amount||0),0);
  const remaining = Math.max(0, Number(loan.amount||0) - paid);
  return {paid, remaining};
}

function calcTotalsGeneral(acc){
  const sum = arr => arr.reduce((s,x)=>s+Number(x.amount||0),0);
  const income = sum(acc.income);
  // دمج المصروفات + المرتبات + السلف في بند واحد
  const allExpenses = [
    ...acc.expense.map(x=>({...x, cat: x.cat||'مصروف'})),
    ...acc.salary.map(x=>({...x, cat:'مرتب', amount: Number(x.amount||0)})),
  ];
  const expense = allExpenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const salaryTotal = sum(acc.salary);
  const advances = acc.salary.reduce((s,x)=>s+Number(x.advance||0),0);
  return {income, expense, salaryTotal, advances, net: income-expense, allExpenses};
}
function calcTotalsCafeteria(acc){
  const salesRevenue = acc.sales.reduce((s,x)=>s+Number(x.total||0),0);
  const cogs = acc.sales.reduce((s,x)=>s+Number(x.cogs||0),0);
  const purchasesTotal = acc.purchases.reduce((s,x)=>s+Number(x.total||0),0);
  const expensesTotal = acc.cafExpenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const grossProfit = salesRevenue - cogs;
  const net = grossProfit - expensesTotal;
  const stockValue = acc.products.reduce((s,p)=>s+(Number(p.qty||0)*Number(p.avgCost||0)),0);
  return {salesRevenue, cogs, purchasesTotal, expensesTotal, grossProfit, net, stockValue};
}
function calcTotalsInstallment(acc){
  const totalPrice = acc.deals.reduce((s,d)=>s+Number(d.totalPrice||0),0);
  const totalDown = acc.deals.reduce((s,d)=>s+Number(d.downPayment||0),0);
  const totalFinanced = acc.deals.reduce((s,d)=>s+Number(d.financed||0),0);
  const totalInterest = acc.deals.reduce((s,d)=>s+Number(d.interestAmount||0),0);
  const totalPayable = acc.deals.reduce((s,d)=>s+Number(d.totalPayable||0),0);
  const totalPaidInstallments = acc.payments.reduce((s,p)=>s+Number(p.amount||0),0);
  const totalRemaining = acc.deals.reduce((s,d)=>s+dealStatus(acc,d).remaining, 0);
  const overdueDeals = acc.deals.filter(d=>dealStatus(acc,d).overdue);
  // إجمالي القسط الشهري المجمّع لجميع العملاء (العمليات النشطة فقط)
  const totalMonthlyInstallments = acc.deals
    .filter(d=>dealStatus(acc,d).remaining>0)
    .reduce((s,d)=>s+Number(d.monthlyInstallment||0),0);
  return {totalPrice, totalDown, totalFinanced, totalInterest, totalPayable,
    totalPaidInstallments, totalRemaining, overdueDeals,
    totalMonthlyInstallments, net: totalInterest};
}
function calcTotalsLoans(acc){
  const totalLent = acc.loans.reduce((s,l)=>s+Number(l.amount||0),0);
  const totalRepaid = acc.repayments.reduce((s,p)=>s+Number(p.amount||0),0);
  const totalRemaining = acc.loans.reduce((s,l)=>s+loanStatus(acc,l).remaining, 0);
  return {totalLent, totalRepaid, totalRemaining, net:0};
}
function getNet(acc){
  if(acc.type === 'cafeteria') return calcTotalsCafeteria(acc).net;
  if(acc.type === 'installment') return calcTotalsInstallment(acc).net;
  if(acc.type === 'loans') return calcTotalsLoans(acc).net;
  return calcTotalsGeneral(acc).net;
}
function calcCombined(){
  let inflow=0, outflow=0;
  state.accounts.forEach(acc=>{
    if(acc.type === 'cafeteria'){
      const t = calcTotalsCafeteria(acc);
      inflow += t.salesRevenue;
      outflow += t.cogs + t.expensesTotal;
    } else if(acc.type === 'installment'){
      const t = calcTotalsInstallment(acc);
      inflow += t.totalInterest;
    } else if(acc.type === 'loans'){
      // loans don't affect profit/loss — they're just outstanding receivables, no inflow/outflow added
    } else {
      const t = calcTotalsGeneral(acc);
      inflow += t.income;
      outflow += t.expense + t.salary;
    }
  });
  return {inflow, outflow, net: inflow-outflow};
}

    : acc.type==='installment' ? '<span class="acc-badge">🧾 تقسيط (فوائد وأقساط)</span>'
    : acc.type==='loans' ? '<span class="acc-badge">🤝 سلف (مستلفون ومسدّدات)</span>' : '';

  app.innerHTML = `

      <div class="acc-actions">

        <button class="btn-outline statement" data-action="statement">📄 كشف حساب مفصل</button>
        <button class="btn-outline remove" data-action="remove-acc">حذف الحساب</button>

function bindNewAccountBox(){
  const submit = document.getElementById('newAccSubmit');
  const input = document.getElementById('newAccInput');
  const typeSel = document.getElementById('newAccType');
  if(!submit) return;
  const doAdd = async ()=>{
    const name = input.value.trim();
    if(!name) return;
    const acc = defaultAccount(name, typeSel.value);
    state.accounts.push(acc);
    state.activeId = acc.id;
    await saveState(); render();
  };
  submit.addEventListener('click', doAdd);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
}

/* ── helper: toggle action panels ── */
function bindActionBar(){
  document.querySelectorAll('.action-btn[data-panel]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id = btn.dataset.panel;
      document.querySelectorAll('.action-panel').forEach(p=>{
        const open = p.id===id && !p.classList.contains('open');
        p.classList.toggle('open', open);
        document.querySelector(`.action-btn[data-panel="${p.id}"]`)?.classList.toggle('active', open);
      });
    });
  });
}

/* ---------- General account ---------- */
function renderGeneral(acc){
  const t = calcTotalsGeneral(acc);
  const incSorted = [...acc.income].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const allExpRows = [
    ...acc.expense.map(x=>({...x, cat: x.cat||'مصروف', src:'expense'})),

  ].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  // الفلاتر تتولد تلقائيًا من الأنواع المضافة فعلًا
  const uniqueCats = ['الكل', ...new Set(allExpRows.map(x=>x.cat))];
  const activeFilter = acc._expFilter && uniqueCats.includes(acc._expFilter) ? acc._expFilter : 'الكل';
  const filtered = activeFilter==='الكل' ? allExpRows : allExpRows.filter(x=>x.cat===activeFilter);
  const totalFiltered = filtered.reduce((s,x)=>s+Number(x.amount||0),0);

  return `
    <div class="stats-bar">
      <div class="stat-item"><span class="stat-lbl">الإيرادات</span><span class="stat-val pos">${fmt(t.income)}</span></div>
      <div class="stat-sep"></div>
      <div class="stat-item"><span class="stat-lbl">إجمالي المصاريف</span><span class="stat-val neg">${fmt(t.expense)}</span></div>
      <div class="stat-sep"></div>
      <div class="stat-item"><span class="stat-lbl">المرتبات</span><span class="stat-val" style="color:var(--c-yellow)">${fmt(t.salaryTotal)}</span></div>
      <div class="stat-sep"></div>
      <div class="stat-item"><span class="stat-lbl">${t.net>=0?'صافي الربح':'صافي الخسارة'}</span><span class="stat-val ${t.net>=0?'pos':'neg'}">${fmt(Math.abs(t.net))}</span></div>
    </div>

    <div class="action-bar">
      <button class="action-btn green" data-panel="panel-income">➕ إيراد جديد</button>
      <button class="action-btn red"   data-panel="panel-expense">➕ مصروف / مرتب / سلفة</button>
    </div>

    <div class="action-panel" id="panel-income">
      <div class="action-panel-inner">
        <input type="date" id="incDate" class="date-input" value="${todayStr()}">
        <input type="text" id="incDesc" placeholder="البيان / الوصف">
        <input type="number" id="incAmount" placeholder="المبلغ" step="0.01">
        <button id="addIncBtn" style="background:var(--c-green)">✔ حفظ</button>
      </div>
    </div>
    <div class="action-panel" id="panel-expense">
      <div class="action-panel-inner">
        <input type="date" id="expDate" class="date-input" value="${todayStr()}">
        <input type="text" id="expCat" placeholder="نوع المصروف (مثال: مرتب، كهرباء...)" list="catDatalist" autocomplete="off">
        <datalist id="catDatalist">${prevCats.map(c=>`<option value="${escapeHtml(c)}">`).join('')}</datalist>
        <input type="text" id="expDesc" placeholder="البيان / الوصف">
        <input type="number" id="expAmount" placeholder="المبلغ" step="0.01">
        <button id="addExpBtn" style="background:var(--c-red)">✔ حفظ</button>
      </div>
    </div>

    <div class="section income-section">
      <div class="section-head"><div class="title"><span class="dot income"></span>الإيرادات</div><div class="total">${fmt(t.income)}</div></div>
      <table>
        <thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th></th></tr></thead>
        <tbody>${incSorted.length===0?`<tr><td colspan="4" class="empty-row">لا توجد إيرادات بعد</td></tr>`:
          incSorted.map(it=>`<tr>

    <div class="section expense-section">
      <div class="section-head">
        <div class="title"><span class="dot expense"></span>المصاريف والمرتبات والسلف</div>
        <div class="total">${activeFilter==='الكل'?fmt(t.expense):fmt(totalFiltered)}</div>
      </div>
      <div class="filter-bar">
        ${uniqueCats.map(c=>{
          const cnt = c==='الكل'?allExpRows.length:allExpRows.filter(x=>x.cat===c).length;
          const tot = c==='الكل'?t.expense:allExpRows.filter(x=>x.cat===c).reduce((s,x)=>s+Number(x.amount||0),0);
          return `<button class="filter-btn ${activeFilter===c?'active':''}" data-filter="${escapeHtml(c)}">

function bindGeneral(){
  const acc = getActive();
  bindActionBar();

  // فلاتر الأنواع
  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      acc._expFilter = btn.dataset.filter;

    });
  });

  document.getElementById('addIncBtn').addEventListener('click', async ()=>{

    acc.income.push({id:uid(),date,desc,amount});

  });

  document.getElementById('addExpBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('expDate').value || todayStr();
    const catRaw = document.getElementById('expCat').value.trim();

/* ---------- Cafeteria account ---------- */
function renderCafeteria(acc){
  const t = calcTotalsCafeteria(acc);
  const salSorted = [...acc.sales].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const purSorted = [...acc.purchases].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const expSorted = [...acc.cafExpenses].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  /* بطاقات أرصدة العملاء */
  const custNames = [...new Set(acc.sales.filter(s=>s.customer).map(s=>s.customer))];
  const custCards = custNames.length===0 ? '' : custNames.map(name=>{
    const creditSales = acc.sales.filter(s=>s.customer===name && s.payType==='credit');
    const cashSales   = acc.sales.filter(s=>s.customer===name && s.payType!=='credit');
    const totalCredit = creditSales.reduce((s,x)=>s+Number(x.total||0),0);
    const totalCash   = cashSales.reduce((s,x)=>s+Number(x.total||0),0);
    const totalPaid   = acc.cafPayments.filter(p=>p.customer===name).reduce((s,x)=>s+Number(x.amount||0),0);
    const remaining   = Math.max(0, totalCredit - totalPaid);
    return `<div class="balance-card ${remaining>0?'owed':'clear'}">
      <div class="balance-name">👤 ${escapeHtml(name)}</div>
      <div class="balance-row"><span>مبيعات نقدية:</span><span class="amt pos">${fmt(totalCash)}</span></div>

// cart state (in-memory, not persisted - resets on navigate)
let posCart = {};

function bindCafeteria(){
  const acc = getActive();
  bindActionBar();
  posCart = {};
  renderCart(acc);

  // ── اختيار منتج من الشبكة ──
  document.querySelectorAll('.pos-product-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pid = btn.dataset.pid;
      const product = acc.products.find(p=>p.id===pid);
      if(!product||product.qty<=0) return;
      if(!posCart[pid]) posCart[pid] = {product, qty:0, unitPrice: product.sellPrice||product.avgCost||0};
      if(posCart[pid].qty >= product.qty){ alert(`الكمية المتاحة: ${fmt(product.qty)} فقط`); return; }
      posCart[pid].qty++;
      renderCart(acc);
    });
  });

  // ── أزرار طريقة الدفع ──
  let posPayType = 'cash';
  document.querySelectorAll('.pos-pay-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      posPayType = btn.dataset.type;
      document.querySelectorAll('.pos-pay-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const checkoutBtn = document.getElementById('posCheckoutBtn');
      if(posPayType==='credit'){
        checkoutBtn.textContent = '📋 تسجيل آجل';
        checkoutBtn.style.background = 'linear-gradient(135deg,#d97706,#f59e0b)';
      } else {
        checkoutBtn.textContent = '✔ تحصيل وحفظ الفاتورة';
        checkoutBtn.style.background = 'linear-gradient(135deg,#16a34a,#22c55e)';
      }
    });
  });

  // ── تحصيل الفاتورة ──
  document.getElementById('posCheckoutBtn').addEventListener('click', async ()=>{
    const items = Object.values(posCart).filter(x=>x.qty>0);
    if(items.length===0){ alert('أضف منتجًا أولًا'); return; }
    if(posPayType==='credit' && !document.getElementById('posCustomer').value.trim()){
      alert('البيع الآجل يتطلب كتابة اسم العميل'); return;
    }
    const date = document.getElementById('posDate').value || todayStr();
    const customer = document.getElementById('posCustomer').value.trim();
    const payType = posPayType; // cash | credit
    for(const item of items){
      const product = acc.products.find(p=>p.id===item.product.id);
      if(!product) continue;
      if(item.qty > product.qty){ alert(`الكمية المتاحة من "${product.name}" هي ${fmt(product.qty)} فقط`); return; }
      const cogs = item.qty * product.avgCost;
      product.qty -= item.qty;
      acc.sales.push({id:uid(), date, productId:product.id, productName:product.name,
        customer, qty:item.qty, unitPrice:item.unitPrice,
        total:item.qty*item.unitPrice, cogs, payType});
    }
    posCart = {};
    await saveState(); render();
  });

  // ── تسعير المنتجات ──
  const savePricesBtn = document.getElementById('saveSellPricesBtn');
  if(savePricesBtn){
    savePricesBtn.addEventListener('click', async ()=>{
      document.querySelectorAll('.sell-price-input').forEach(inp=>{
        const pid = inp.dataset.pid;
        const product = acc.products.find(p=>p.id===pid);
        if(product) product.sellPrice = parseFloat(inp.value)||0;
      });
      await saveState(); render();
    });
  }

  // ── استلام بضاعة (قائمة متعددة) ──
  let purchaseCart = [];
  function renderPurchaseCart(){
    const container = document.getElementById('purchaseCartItems');
    const totalEl   = document.getElementById('purchaseTotalDisplay');
    if(!container) return;
    if(purchaseCart.length===0){
      container.innerHTML = `<div class="purchase-empty">لم تضف أي بند بعد — أضف من الأعلى</div>`;
      if(totalEl) totalEl.textContent = '0';
      return;
    }
    let total = 0;
    container.innerHTML = purchaseCart.map((item,i)=>{
      const lineTotal = item.qty * item.unitCost;
      total += lineTotal;
      return `<div class="purchase-cart-row">
        <span class="purch-name">${escapeHtml(item.name)}</span>
        <span class="purch-detail">${escapeHtml(item.supplier||'—')}</span>
        <span class="purch-detail">${fmt(item.qty)} × ${fmt(item.unitCost)}</span>
        <span class="purch-total">${fmt(lineTotal)}</span>
        <button class="del-btn" data-del-row="${i}">✕</button>
      </div>`;
    }).join('');
    if(totalEl) totalEl.textContent = fmt(total);
    container.querySelectorAll('[data-del-row]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        purchaseCart.splice(parseInt(btn.dataset.delRow),1);
        renderPurchaseCart();
      });
    });
  }

  document.getElementById('addPurchaseRowBtn').addEventListener('click', ()=>{
    const name     = document.getElementById('purchaseProductName').value.trim();
    const supplier = document.getElementById('purchaseSupplier').value.trim();
    const qty      = parseFloat(document.getElementById('purchaseQty').value);
    const unitCost = parseFloat(document.getElementById('purchaseUnitCost').value);
    if(!name || isNaN(qty) || qty<=0 || isNaN(unitCost) || unitCost<0) return;
    purchaseCart.push({name, supplier, qty, unitCost});
    document.getElementById('purchaseProductName').value = '';
    document.getElementById('purchaseQty').value = '';
    document.getElementById('purchaseUnitCost').value = '';
    document.getElementById('purchaseProductName').focus();
    renderPurchaseCart();
  });

  // Enter في حقل السعر يضيف مباشرة
  document.getElementById('purchaseUnitCost').addEventListener('keydown', e=>{
    if(e.key==='Enter') document.getElementById('addPurchaseRowBtn').click();
  });

  document.getElementById('savePurchaseBtn').addEventListener('click', async ()=>{
    if(purchaseCart.length===0){ alert('أضف بندًا واحدًا على الأقل'); return; }
    const date = document.getElementById('purchaseDate').value || todayStr();
    for(const item of purchaseCart){
      let product = acc.products.find(p=>p.name.trim()===item.name);
      if(!product){ product={id:uid(),name:item.name,qty:0,avgCost:0,sellPrice:0}; acc.products.push(product); }
      const newQty = product.qty + item.qty;
      product.avgCost = newQty>0 ? ((product.qty*product.avgCost)+(item.qty*item.unitCost))/newQty : item.unitCost;
      product.qty = newQty;
      acc.purchases.push({id:uid(), date, productId:product.id, productName:product.name,
        supplier:item.supplier, qty:item.qty, unitCost:item.unitCost, total:item.qty*item.unitCost});
    }
    purchaseCart = [];
    await saveState(); render();
  });

  renderPurchaseCart();

  document.getElementById('addCafExpBtn').addEventListener('click', async ()=>{
    const date=document.getElementById('cafExpDate').value||todayStr();
    const desc=document.getElementById('cafExpDesc').value.trim();
    const kind=document.getElementById('cafExpKind').value;
    const amount=parseFloat(document.getElementById('cafExpAmount').value);
    if(!desc||isNaN(amount)) return;
    acc.cafExpenses.push({id:uid(),date,desc,kind,amount});
    await saveState(); render();
  });

  document.getElementById('addCafPayBtn').addEventListener('click', async ()=>{
    const date=document.getElementById('cafPayDate').value||todayStr();
    const customer=document.getElementById('cafPayCustomer').value.trim();
    const amount=parseFloat(document.getElementById('cafPayAmount').value);
    if(!customer||isNaN(amount)||amount<=0) return;
    acc.cafPayments.push({id:uid(),date,customer,amount});
    await saveState(); render();
  });

  document.querySelectorAll('[data-del-cafpay]').forEach(btn=>btn.addEventListener('click',async()=>{
    acc.cafPayments=acc.cafPayments.filter(x=>x.id!==btn.dataset.delCafpay);
    await saveState(); render();
  }));
  document.querySelectorAll('[data-del-purchase]').forEach(btn=>btn.addEventListener('click',async()=>{
    const p=acc.purchases.find(x=>x.id===btn.dataset.delPurchase);
    if(p){ const pr=acc.products.find(x=>x.id===p.productId); if(pr) pr.qty=Math.max(0,pr.qty-p.qty);
      acc.purchases=acc.purchases.filter(x=>x.id!==p.id); await saveState(); render(); }
  }));
  document.querySelectorAll('[data-del-sale]').forEach(btn=>btn.addEventListener('click',async()=>{
    const s=acc.sales.find(x=>x.id===btn.dataset.delSale);
    if(s){ const pr=acc.products.find(x=>x.id===s.productId); if(pr) pr.qty+=s.qty;
      acc.sales=acc.sales.filter(x=>x.id!==s.id); await saveState(); render(); }
  }));
  document.querySelectorAll('[data-del-cafexpense]').forEach(btn=>btn.addEventListener('click',async()=>{
    acc.cafExpenses=acc.cafExpenses.filter(x=>x.id!==btn.dataset.delCafexpense); await saveState(); render();
  }));
}

function renderCart(acc){
  const items = Object.values(posCart).filter(x=>x.qty>0);
  const container = document.getElementById('posCartItems');
  const totalEl = document.getElementById('posTotalDisplay');
  if(!container) return;
  if(items.length===0){
    container.innerHTML = `<div class="pos-cart-empty">لم تختر أي منتج بعد</div>`;
    if(totalEl) totalEl.textContent = '0';
    return;
  }
  let total = 0;
  container.innerHTML = items.map(item=>{
    const lineTotal = item.qty * item.unitPrice;
    total += lineTotal;
    return `
      <div class="pos-cart-row">
        <span class="pos-cart-name">${escapeHtml(item.product.name)}</span>
        <div class="pos-cart-controls">
          <button class="pos-qty-btn" data-dec="${item.product.id}">−</button>
          <span class="pos-cart-qty">${item.qty}</span>
          <button class="pos-qty-btn" data-inc="${item.product.id}">+</button>
        </div>
        <span class="pos-cart-price">${fmt(lineTotal)}</span>
        <button class="pos-cart-del" data-rem="${item.product.id}">✕</button>
      </div>
      <div class="pos-price-edit">
        <span>سعر الوحدة:</span>
        <input type="number" class="pos-price-input" data-pid="${item.product.id}"
          value="${item.unitPrice}" step="0.01" min="0">
      </div>`;
  }).join('');
  if(totalEl) totalEl.textContent = fmt(total);

  // ربط الأزرار
  container.querySelectorAll('[data-inc]').forEach(btn=>btn.addEventListener('click',()=>{
    const pid=btn.dataset.inc; const product=acc.products.find(p=>p.id===pid);
    if(posCart[pid] && product && posCart[pid].qty<product.qty){ posCart[pid].qty++; renderCart(acc); }
    else if(product) alert(`الكمية المتاحة: ${fmt(product.qty)}`);
  }));
  container.querySelectorAll('[data-dec]').forEach(btn=>btn.addEventListener('click',()=>{
    const pid=btn.dataset.dec;
    if(posCart[pid]){ posCart[pid].qty=Math.max(0,posCart[pid].qty-1);
      if(posCart[pid].qty===0) delete posCart[pid]; renderCart(acc); }
  }));
  container.querySelectorAll('[data-rem]').forEach(btn=>btn.addEventListener('click',()=>{
    delete posCart[btn.dataset.rem]; renderCart(acc);
  }));
  container.querySelectorAll('.pos-price-input').forEach(inp=>inp.addEventListener('input',()=>{
    const pid=inp.dataset.pid; if(posCart[pid]) posCart[pid].unitPrice=parseFloat(inp.value)||0; renderCart(acc);
  }));
}

function openCustInstall(acc, custId){
  const customer = acc.customers.find(c=>c.id===custId);
  if(!customer) return;

  let activeTab = 'remaining';

  /* بناء جدول شهري مجمّع من كل عمليات العميل */
  function buildConsolidated(){
    const custDeals = acc.deals.filter(d=>d.customerId===custId);
    const monthMap  = {};

    custDeals.forEach(deal=>{
      for(let i=1; i<=deal.months; i++){
        const dueDate = addMonths(deal.date, i);
        const ym = dueDate.slice(0,7);
        if(!monthMap[ym]) monthMap[ym] = {dueDate, amount:0, shares:[]};
        monthMap[ym].amount += deal.monthlyInstallment;
        monthMap[ym].shares.push({dealId:deal.id, amount:deal.monthlyInstallment});
      }
    });

    // حساب الأقساط المدفوعة — تُوزَّع بالترتيب الزمني
    const sortedMonths = Object.keys(monthMap).sort();
    let paidPool = custDeals.reduce((s,d)=>s+dealStatus(acc,d).paid, 0);

    return sortedMonths.map((ym,idx)=>{
      const entry   = monthMap[ym];
      const isPaid  = paidPool >= entry.amount;
      if(isPaid) paidPool -= entry.amount;
      const isOverdue = !isPaid && entry.dueDate < todayStr();
      return {num:idx+1, ym, dueDate:entry.dueDate, amount:entry.amount, shares:entry.shares, isPaid, isOverdue};
    });
  }

  function calcTotals(){
    const custDeals   = acc.deals.filter(d=>d.customerId===custId);
    const totalPayable= custDeals.reduce((s,d)=>s+Number(d.totalPayable||0),0);
    const totalPaid   = custDeals.reduce((s,d)=>s+dealStatus(acc,d).paid,0);
    const totalRemain = Math.max(0, totalPayable-totalPaid);
    const pct = totalPayable>0 ? Math.min(100,Math.round((totalPaid/totalPayable)*100)) : 0;
    return {totalPayable, totalPaid, totalRemain, pct};
  }

  function renderModal(){
    const {totalPaid, totalRemain, pct} = calcTotals();
    const schedule      = buildConsolidated();
    const remainingList = schedule.filter(x=>!x.isPaid);
    const paidList      = schedule.filter(x=>x.isPaid);
    const listToShow    = activeTab==='remaining' ? remainingList : paidList;

    const rows = listToShow.length===0
      ? `<div class="cim-empty">لا توجد أقساط في هذا القسم</div>`
      : listToShow.map(inst=>`
        <div class="cim-row ${inst.isPaid?'done':inst.isOverdue?'late':''}">
          <div class="cim-row-right">
            <span class="cim-inst-title">القسط ${inst.num}</span>
            <span class="cim-inst-date">🗓 ${fmtDate(inst.dueDate)}</span>
            ${inst.isOverdue?`<span class="cim-late-badge">متأخر</span>`:''}
            ${inst.shares.length>1?`<span style="font-size:10px;color:#6b7280;">(${inst.shares.length} عمليات مجمّعة)</span>`:''}
          </div>
          <span class="cim-inst-amt">${fmt(inst.amount)}</span>
          ${inst.isPaid
            ? `<span class="cim-paid-badge">✓</span>`
            : `<button class="cim-pay-btn"
                data-pay-month="${inst.ym}"
                data-pay-amount="${inst.amount}"
                data-pay-shares='${JSON.stringify(inst.shares)}'>تسديد</button>`}
        </div>`).join('');

    document.getElementById('custInstallModal').innerHTML = `
      <div class="cim-header">
        <button class="cim-close" id="closeCimBtn">✕</button>
        <span class="cim-title">👤 ${escapeHtml(customer.name)}</span>
      </div>
      <div class="cim-progress">
        <div class="cim-progress-nums">
          <div class="cim-prog-item"><div class="cim-prog-lbl">المتبقي</div><div class="cim-prog-val remaining">${fmt(totalRemain)}</div></div>
          <div class="cim-prog-sep"></div>
          <div class="cim-prog-item"><div class="cim-prog-lbl">المسدّد</div><div class="cim-prog-val paid">${fmt(totalPaid)}</div></div>
        </div>
        <div class="cim-prog-bar-wrap"><div class="cim-prog-bar" style="width:${pct}%"></div></div>
        <div class="cim-prog-pct"><span>0%</span><span class="cim-pct-mid">${pct}% مسدّد</span><span>100%</span></div>
      </div>
      <div class="cim-tabs">
        <button class="cim-tab ${activeTab==='remaining'?'active':''}" data-cim-tab="remaining">المتبقية (${remainingList.length})</button>
        <button class="cim-tab ${activeTab==='paid'?'active':''}" data-cim-tab="paid">المسددة (${paidList.length})</button>
      </div>
      <div class="cim-list">${rows}</div>
    `;

    document.getElementById('closeCimBtn').onclick = ()=>
      document.getElementById('custInstallOverlay').classList.remove('open');

    document.querySelectorAll('[data-cim-tab]').forEach(btn=>
      btn.addEventListener('click',()=>{ activeTab=btn.dataset.cimTab; renderModal(); }));

    document.querySelectorAll('[data-pay-month]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const shares = JSON.parse(btn.dataset.payShares);
        const date   = todayStr();
        // توزيع الدفع على كل عملية بحصتها
        shares.forEach(sh=>{
          const deal = acc.deals.find(d=>d.id===sh.dealId);
          if(!deal) return;
          const st = dealStatus(acc, deal);
          const toPay = Math.min(sh.amount, st.remaining);
          if(toPay > 0) acc.payments.push({id:uid(), date, dealId:sh.dealId, amount:toPay});
        });
        renderModal();  // فوري
        saveState();    // في الخلفية
      });
    });
  }

  document.getElementById('custInstallOverlay').classList.add('open');
  renderModal();
  document.getElementById('custInstallOverlay').onclick = e=>{
    if(e.target===document.getElementById('custInstallOverlay'))
      document.getElementById('custInstallOverlay').classList.remove('open');
  };
}

    <div class="edm-row"><label class="edm-lbl">عدد الأشهر</label>
      <input class="edm-input" id="edm-months" type="number" value="${d.months}" step="1"></div>
    <div class="edm-result">
      <span class="edm-result-lbl">القسط الشهري الجديد</span>
      <span class="edm-result-val" id="edm-monthly-preview">${fmt(d.monthlyInstallment)}</span>
    </div>
    <div class="edm-actions">
      <button class="edm-cancel" id="edm-cancel">إلغاء</button>
      <button class="edm-save" id="edm-save">✔ حفظ التعديلات</button>
    </div>
  `;

  overlay.classList.add('open');
  ['edm-price','edm-down','edm-rate','edm-months'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input', calcPreview);
  });

  document.getElementById('edm-cancel').onclick = ()=> overlay.classList.remove('open');

  document.getElementById('edm-save').onclick = async ()=>{
    const price  = parseFloat(document.getElementById('edm-price').value);
    const down   = parseFloat(document.getElementById('edm-down').value)||0;
    const rate   = parseFloat(document.getElementById('edm-rate').value)||0;
    const months = parseInt(document.getElementById('edm-months').value)||1;
    const date   = document.getElementById('edm-date').value || d.date;
    if(isNaN(price)||price<=0||months<=0) return;
    if(down>price){alert('المقدم لا يمكن أن يكون أكبر من السعر');return;}
    const financed       = price - down;
    const interestAmount = financed * (rate/100);
    const totalPayable   = financed + interestAmount;
    const monthlyInstallment = totalPayable / months;
    Object.assign(d, {date, totalPrice:price, downPayment:down, interestRate:rate,
      financed, interestAmount, totalPayable, months, monthlyInstallment});
    overlay.classList.remove('open');
    await saveState(); render();
  };
  overlay.onclick = e=>{ if(e.target===overlay) overlay.classList.remove('open'); };
}

function bindInstallment(){
  const acc = getActive();
  bindActionBar();

  // ── مسح أقساط عملية (إعادة تصفير المدفوعات) ──
  document.querySelectorAll('[data-clear-deal]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const deal = acc.deals.find(d=>d.id===btn.dataset.clearDeal);
      if(!deal) return;
      const st = dealStatus(acc, deal);
      if(st.paid===0){ alert('لا توجد أقساط مدفوعة على هذه العملية'); return; }
      if(!confirm(`هل تريد مسح جميع الأقساط المسددة لعملية "${deal.customerName}"؟\nسيتم إعادة الرصيد لـ ${fmt(deal.totalPayable)} وإلغاء كل ${fmt(st.paid)} المسدّدة.`)) return;
      acc.payments = acc.payments.filter(p=>p.dealId !== deal.id);
      await saveState(); render();
    });
  });

  // ── تعديل عملية تقسيط ──
  document.querySelectorAll('[data-edit-deal]').forEach(btn=>{
    btn.addEventListener('click', ()=> openEditDeal(acc, btn.dataset.editDeal));
  });

  // ── سداد مباشر من بانر التأخير ──
  document.querySelectorAll('[data-pay-overdue]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const dealId = btn.dataset.payOverdue;
      const amount = parseFloat(btn.dataset.payAmount);
      const deal   = acc.deals.find(d=>d.id===dealId);
      if(!deal) return;
      const st = dealStatus(acc, deal);
      if(st.remaining<=0){ btn.textContent='✅ مسدّد'; return; }
      const toPay = Math.min(amount, st.remaining);
      acc.payments.push({id:uid(), date:todayStr(), dealId, amount:toPay});
      btn.textContent='✅ تم';
      btn.disabled=true;
      btn.style.background='#6b7280';
      saveState().then(()=>render());
    });
  });

  // ── فتح تفاصيل العميل لما يضغط على البطاقة ──
  document.querySelectorAll('.cust-clickable[data-cust-id]').forEach(card=>{
    card.addEventListener('click', ()=>openCustInstall(acc, card.dataset.custId));
  });

  // ── إضافة عميل ──
  document.getElementById('addCustBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    if(!name) return;
    acc.customers.push({id: uid(), name, phone});
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-customer]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.customers = acc.customers.filter(c=>c.id!==btn.dataset.delCustomer);
      await saveState(); render();
    });
  });

  // ── إضافة مورد ──
  document.getElementById('addSuppBtn').addEventListener('click', async ()=>{
    const name = document.getElementById('suppName').value.trim();
    const phone = document.getElementById('suppPhone').value.trim();
    if(!name) return;
    acc.suppliers.push({id: uid(), name, phone});
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-supplier]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.suppliers = acc.suppliers.filter(s=>s.id!==btn.dataset.delSupplier);
      await saveState(); render();
    });
  });

  // ── عملية تقسيط جديدة ──
  document.getElementById('addDealBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('dealDate').value || todayStr();
    const customerName = document.getElementById('dealCustomerName').value.trim();
    const supplierId = document.getElementById('dealSupplier').value;
    const totalPrice = parseFloat(document.getElementById('dealPrice').value);
    const downPayment = parseFloat(document.getElementById('dealDown').value) || 0;
    const interestRate = parseFloat(document.getElementById('dealRate').value) || 0;
    const months = parseInt(document.getElementById('dealMonths').value, 10);

    if(!customerName){ alert('من فضلك اكتب اسم العميل'); return; }
    if(isNaN(totalPrice) || totalPrice<=0 || isNaN(months) || months<=0) return;
    if(downPayment > totalPrice){ alert('المقدم لا يمكن أن يكون أكبر من السعر الإجمالي'); return; }

    // تسجيل العميل تلقائياً لو مش موجود
    let customer = acc.customers.find(c=>c.name.trim()===customerName);
    if(!customer){
      customer = {id: uid(), name: customerName, phone:''};
      acc.customers.push(customer);
    }
    const supplier = acc.suppliers.find(s=>s.id===supplierId);
    const financed = totalPrice - downPayment;
    const interestAmount = financed * (interestRate/100);
    const totalPayable = financed + interestAmount;
    const monthlyInstallment = totalPayable / months;

    acc.deals.push({
      id: uid(), date, customerId: customer.id, customerName: customer.name,
      supplierId: supplier?supplier.id:null, supplierName: supplier?supplier.name:null,
      totalPrice, downPayment, interestRate, financed, interestAmount, totalPayable, months, monthlyInstallment
    });
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-deal]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.deals = acc.deals.filter(d=>d.id !== btn.dataset.delDeal);
      acc.payments = acc.payments.filter(p=>p.dealId !== btn.dataset.delDeal);
      await saveState(); render();
    });
  });

  // ── تسجيل سداد ──
  document.getElementById('addPaymentBtn').addEventListener('click', async ()=>{
    const date = document.getElementById('paymentDate').value || todayStr();
    const dealId = document.getElementById('paymentDeal').value;
    const amount = parseFloat(document.getElementById('paymentAmount').value);
    if(!dealId || isNaN(amount) || amount<=0) return;
    const deal = acc.deals.find(d=>d.id===dealId);
    const st = dealStatus(acc, deal);
    if(amount > st.remaining + 0.01){ alert(`المبلغ أكبر من المتبقي على هذا العميل (${fmt(st.remaining)})`); return; }
    acc.payments.push({id: uid(), date, dealId, amount});
    await saveState(); render();
  });
  document.querySelectorAll('[data-del-payment]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      acc.payments = acc.payments.filter(p=>p.id !== btn.dataset.delPayment);
      await saveState(); render();
    });
  });

  // ── نسخ رسالة تذكير ──
  document.querySelectorAll('[data-copy-deal]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const deal = acc.deals.find(d=>d.id===btn.dataset.copyDeal);
      const st = dealStatus(acc, deal);
      const text = reminderText(acc, deal, st);
      try{
        await navigator.clipboard.writeText(text);
        btn.textContent = '✅ تم النسخ';
        setTimeout(()=>{ btn.textContent = '📋 نسخ تذكير'; }, 1800);
      }catch(e){ alert(text); }
    });
  });
}

/* ---------- Reports page ---------- */
function getAccTotals(acc){
  if(acc.type==='cafeteria'){
    const t=calcTotalsCafeteria(acc);
    return {inflow:t.salesRevenue, outflow:t.cogs+t.expensesTotal, net:t.net, extra:[
      {lbl:'إجمالي المبيعات', val:t.salesRevenue, cls:'pos'},
      {lbl:'تكلفة البضاعة المباعة', val:t.cogs, cls:'neg'},
      {lbl:'مصاريف الشراء والبيع', val:t.expensesTotal, cls:'neg'},
      {lbl:'قيمة المخزون', val:t.stockValue, cls:''},
    ]};
  }
  if(acc.type==='installment'){
    const t=calcTotalsInstallment(acc);
    return {inflow:t.totalPaidInstallments+t.totalDown, outflow:0, net:t.net, extra:[
      {lbl:'إجمالي أسعار السلع', val:t.totalPrice, cls:''},
      {lbl:'إجمالي المقدمات', val:t.totalDown, cls:'pos'},
      {lbl:'إجمالي الفوائد', val:t.totalInterest, cls:'pos'},
      {lbl:'المتبقي على العملاء', val:t.totalRemaining, cls:'neg'},
    ]};
  }
  if(acc.type==='loans'){
    const t=calcTotalsLoans(acc);
    return {inflow:t.totalRepaid, outflow:t.totalLent, net:0, extra:[
      {lbl:'إجمالي السلف المعطاة', val:t.totalLent, cls:'neg'},
      {lbl:'إجمالي المسدد', val:t.totalRepaid, cls:'pos'},
      {lbl:'المتبقي', val:t.totalRemaining, cls:'neg'},
    ]};
  }
  const t=calcTotalsGeneral(acc);
  return {inflow:t.income, outflow:t.expense+t.salary, net:t.net, extra:[
    {lbl:'إجمالي الإيرادات', val:t.income, cls:'pos'},
    {lbl:'إجمالي المصروفات', val:t.expense, cls:'neg'},
    {lbl:'إجمالي المرتبات', val:t.salary, cls:'neg'},
    {lbl:'إجمالي السلف على الموظفين', val:t.advances||0, cls:'neg'},
  ]};
}

function getMonthlyForAcc(acc){
  const ledger = buildLedger(acc);
  const byMonth = {};
  ledger.forEach(e=>{
    const ym=(e.date||'').slice(0,7)||'بدون تاريخ';
    if(!byMonth[ym]) byMonth[ym]={inflow:0,outflow:0};
    if(e.amount>=0) byMonth[ym].inflow+=e.amount;
    else byMonth[ym].outflow+=-e.amount;
  });
  return Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(ym=>({
    ym, inflow:byMonth[ym].inflow, outflow:byMonth[ym].outflow, net:byMonth[ym].inflow-byMonth[ym].outflow
  }));
}

      <table>
        <thead><tr><th>الشهر</th><th>إجمالي الداخل</th><th>إجمالي الخارج</th><th>صافي الربح / الخسارة</th></tr></thead>
        <tbody>${monthRows}</tbody>
      </table>
    </div>
  `;
}

function bindReports(){
  document.querySelectorAll('[data-acc-id]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const acc = state.accounts.find(a=>a.id===btn.dataset.accId);
      if(acc) openStatement(acc);
    });
  });
}

/* ---------- Detailed statement (كشف حساب) ---------- */
function buildLedger(acc){
  let entries = [];
  if(acc.type === 'cafeteria'){
    acc.purchases.forEach(p => entries.push({date:p.date, desc:`شراء بضاعة: ${p.productName} (${fmt(p.qty)} وحدة)`, type:'شراء', amount:-p.total}));
    acc.sales.forEach(s => entries.push({date:s.date, desc:`بيع بضاعة: ${s.productName} (${fmt(s.qty)} وحدة)`, type:'بيع', amount:+s.total}));
    acc.cafExpenses.forEach(e => entries.push({date:e.date, desc:e.desc, type:e.kind==='buy'?'مصروف شراء':'مصروف بيع', amount:-e.amount}));
  } else if(acc.type === 'installment'){
    acc.deals.forEach(d => {
      entries.push({date:d.date, desc:`مقدم مقبوض من: ${d.customerName}`, type:'مقدم', amount:+d.downPayment});
    });
    acc.payments.forEach(p => {
      const deal = acc.deals.find(d=>d.id===p.dealId);
      entries.push({date:p.date, desc:`قسط مقبوض من: ${deal?deal.customerName:'—'}`, type:'قسط', amount:+p.amount});
    });
  } else if(acc.type === 'loans'){
    acc.loans.forEach(l => entries.push({date:l.date, desc:`سلفة معطاة لـ: ${l.borrowerName}`, type:'سلفة', amount:-l.amount}));
    acc.repayments.forEach(p => {
      const loan = acc.loans.find(l=>l.id===p.loanId);
      entries.push({date:p.date, desc:`سداد سلفة من: ${loan?loan.borrowerName:'—'}`, type:'سداد', amount:+p.amount});
    });
  } else {
    acc.income.forEach(i => entries.push({date:i.date, desc:i.desc, type:'إيراد', amount:+i.amount}));
    acc.expense.forEach(e => entries.push({date:e.date, desc:e.desc, type:'مصروف', amount:-e.amount}));
    acc.salary.forEach(s => entries.push({date:s.date, desc:`مرتب: ${s.desc}`, type:'مرتب', amount:-s.amount}));
  }
  entries.sort((a,b)=> (a.date||'').localeCompare(b.date||''));
  let balance = 0;
  return entries.map(e => { balance += e.amount; return {...e, balance}; });
}

function openStatement(acc){
  const ledger = buildLedger(acc);
  const overlay = document.getElementById('statementOverlay');
  const box = document.getElementById('statementBox');

  box.innerHTML = `
    <div class="statement-head">
      <h3>📄 كشف حساب مفصل — ${escapeHtml(acc.name)}</h3>
      <button class="close-statement" id="closeStatementBtn">✕</button>
    </div>
    <table class="statement-table">
      <thead><tr><th>التاريخ</th><th>البيان</th><th>نوع الحركة</th><th>المبلغ</th><th>الرصيد التراكمي</th></tr></thead>
      <tbody>
        ${ledger.length === 0 ? `<tr><td colspan="5" class="empty-row">لا توجد حركات مسجلة على هذا الحساب بعد</td></tr>` :
          ledger.map(e => `
            <tr>
              <td class="date-cell">${fmtDate(e.date)}</td>
              <td>${escapeHtml(e.desc)}</td>
              <td><span class="type-tag ${e.amount>=0?'in':'out'}">${e.type}</span></td>
              <td class="amt ${e.amount>=0?'pos':'neg'}">${e.amount>=0?'+':'-'}${fmt(Math.abs(e.amount))}</td>
              <td class="running-bal" style="color:${e.balance>=0?'var(--green)':'var(--red)'}">${fmt(e.balance)}</td>
            </tr>
          `).join('')}
      </tbody>
    </table>
  `;
  overlay.style.display = 'flex';
  document.getElementById('closeStatementBtn').addEventListener('click', ()=>{ overlay.style.display = 'none'; });
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.style.display = 'none'; }, {once:true});
}

/* ---------- Monthly profit/loss ---------- */
function calcMonthly(acc){
  const ledger = buildLedger(acc);
  const byMonth = {};
  ledger.forEach(e=>{
    const ym = (e.date || '').slice(0,7) || 'بدون تاريخ';
    if(!byMonth[ym]) byMonth[ym] = {inflow:0, outflow:0};
    if(e.amount >= 0) byMonth[ym].inflow += e.amount;
    else byMonth[ym].outflow += -e.amount;
  });
  return Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(ym => ({
    ym, inflow: byMonth[ym].inflow, outflow: byMonth[ym].outflow, net: byMonth[ym].inflow - byMonth[ym].outflow
  }));
}
function openMonthly(acc){
  const months = calcMonthly(acc);
  const overlay = document.getElementById('statementOverlay');
  const box = document.getElementById('statementBox');
  box.innerHTML = `
    <div class="statement-head">
      <h3>📅 الأرباح والخسائر الشهرية — ${escapeHtml(acc.name)}</h3>
      <button class="close-statement" id="closeStatementBtn">✕</button>
    </div>
    <table class="statement-table">
      <thead><tr><th>الشهر</th><th>إجمالي الداخل</th><th>إجمالي الخارج</th><th>صافي الربح / الخسارة</th></tr></thead>
      <tbody>
        ${months.length === 0 ? `<tr><td colspan="4" class="empty-row">لا توجد حركات مسجلة بعد</td></tr>` :
          months.map(m => `
            <tr>
              <td>${m.ym === 'بدون تاريخ' ? m.ym : monthLabel(m.ym)}</td>
              <td class="amt pos">${fmt(m.inflow)}</td>
              <td class="amt neg">${fmt(m.outflow)}</td>
              <td class="amt ${m.net>=0?'pos':'neg'}">${m.net>=0?'ربح ':'خسارة '}${fmt(Math.abs(m.net))}</td>
            </tr>
          `).join('')}
      </tbody>
    </table>
  `;
  overlay.style.display = 'flex';
  document.getElementById('closeStatementBtn').addEventListener('click', ()=>{ overlay.style.display = 'none'; });
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) overlay.style.display = 'none'; }, {once:true});
}

/* ---------- Init ---------- */
(async ()=>{
  await loadState();
  render();
})();
</script>
